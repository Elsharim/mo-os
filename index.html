<style>
  :root{
    --bg:#0a0b0f;
    --bg-2:#0e1016;
    --panel:#0f1218;
    --card:#14171f;
    --card-2:#1a1e28;
    --card-hi:#1f2531;
    --border:#242936;
    --border-2:#323a4b;
    --text:#eef1f6;
    --muted:#aab2c2;
    --faint:#7c8698;
    --accent:#5b8cff;
    --accent-2:#9d6bff;
    --accent-soft:rgba(91,140,255,.15);
    --teal:#2fd9c5;
    --good:#3ee099;
    --good-soft:rgba(62,224,153,.14);
    --warn:#f2b544;
    --warn-soft:rgba(242,181,68,.14);
    --bad:#f26a5e;
    --bad-soft:rgba(242,106,94,.14);
    --gold:#f5c76b;
    --r:14px;
    --r-sm:10px;
    --sans:'Inter',system-ui,-apple-system,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.25);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:
      radial-gradient(120% 90% at 100% -10%,rgba(91,140,255,.07),transparent 55%),
      radial-gradient(90% 70% at 0% 0%,rgba(157,107,255,.05),transparent 50%),
      var(--bg);
    color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}
  ::selection{background:rgba(91,140,255,.32)}
  button{font-family:inherit}
  input,textarea,select{font-family:inherit;color:inherit}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  a{color:var(--accent)}

  .shell{display:flex;min-height:100vh}
  .rail{width:216px;flex:0 0 216px;background:linear-gradient(180deg,var(--panel),var(--bg-2));border-right:1px solid var(--border);display:flex;flex-direction:column;gap:3px;padding:20px 13px;position:sticky;top:0;height:100vh}
  .brand{padding:6px 10px 20px;display:flex;flex-direction:column;gap:4px}
  .brand .logo{display:flex;align-items:center;gap:9px}
  .brand .mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;font-weight:800;font-size:15px;color:#fff;box-shadow:0 4px 12px rgba(91,140,255,.35);flex:0 0 32px}
  .brand input{background:none;border:none;font-size:17px;font-weight:700;color:var(--text);padding:0;width:100%;letter-spacing:-.01em}
  .brand input:focus{outline:none}
  .brand .sub{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);padding-left:1px}
  .navbtn{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:none;border:none;color:var(--muted);cursor:pointer;padding:11px 13px;border-radius:10px;font-size:13.5px;font-weight:500;transition:.15s;position:relative}
  .navbtn svg{width:18px;height:18px;flex:0 0 18px;stroke:currentColor;fill:none;stroke-width:1.7}
  .navbtn:hover{color:var(--text);background:rgba(255,255,255,.035)}
  .navbtn.active{color:var(--text);background:linear-gradient(90deg,var(--accent-soft),transparent 85%)}
  .navbtn.active::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;border-radius:0 3px 3px 0;background:linear-gradient(180deg,var(--accent),var(--accent-2))}
  .navbtn.active svg{stroke:var(--accent)}
  .rail-foot{margin-top:auto;padding:11px 13px;font-size:11px;color:var(--faint);display:flex;align-items:center;gap:8px}
  .rail-foot .dot{width:7px;height:7px;border-radius:99px;background:var(--faint)}
  .rail-foot .dot.live{background:var(--good);box-shadow:0 0 9px var(--good)}
  .rail-foot .dot.err{background:var(--bad)}

  .stage{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{border-bottom:1px solid var(--border);padding:18px 34px;display:flex;justify-content:space-between;align-items:center;gap:20px;background:linear-gradient(180deg,rgba(255,255,255,.015),transparent)}
  .topbar .hi{font-size:18px;font-weight:600;letter-spacing:-.01em;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .topbar .hi .greet-hey{font-size:19px;font-weight:700;letter-spacing:-.02em}
  .streak-badge{display:inline-flex;align-items:center;gap:7px;padding:6px 13px 6px 10px;border-radius:99px;
    background:linear-gradient(135deg,rgba(245,199,107,.16),rgba(245,199,107,.06));
    border:1px solid rgba(245,199,107,.35);box-shadow:0 2px 10px rgba(245,199,107,.12)}
  .streak-badge svg{width:16px;height:16px;fill:var(--gold);stroke:none;filter:drop-shadow(0 0 5px rgba(245,199,107,.5))}
  .streak-badge b{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--gold);line-height:1}
  .streak-badge span{font-size:11px;color:var(--gold);opacity:.85;letter-spacing:.02em}
  .topbar .clock{font-size:21px;font-weight:600;font-family:var(--mono);font-variant-numeric:tabular-nums;text-align:right}
  .topbar .date{font-size:11px;letter-spacing:.11em;text-transform:uppercase;color:var(--muted);margin-top:2px;text-align:right}

  main{padding:26px 34px 90px;max-width:1240px;width:100%}
  .view{animation:fade .3s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.view{animation:none}}

  .head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;gap:16px;flex-wrap:wrap}
  h2.sec{font-size:24px;font-weight:800;margin:0;letter-spacing:-.025em}
  .sec-sub{color:var(--muted);font-size:13px;margin:3px 0 0}

  .grid{display:grid;gap:16px}
  .g2{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g23{grid-template-columns:1.4fr 1fr}
  @media (max-width:960px){.g2,.g3,.g23{grid-template-columns:1fr}}

  .card{background:linear-gradient(180deg,var(--card),var(--bg-2));border:1px solid var(--border);border-radius:var(--r);padding:20px;transition:border-color .15s,transform .15s;box-shadow:var(--shadow)}
  .card.hover:hover{border-color:var(--border-2);transform:translateY(-2px)}
  .card h3{margin:0 0 16px;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .card h3 .h3sub{text-transform:none;letter-spacing:0;color:var(--faint);font-weight:500;font-size:11px}

  .hero{background:
      radial-gradient(120% 120% at 100% 0,rgba(157,107,255,.12),transparent 55%),
      linear-gradient(150deg,var(--card-hi),var(--card));
    border:1px solid var(--border-2);display:flex;gap:28px;align-items:center;flex-wrap:wrap}
  .ring-wrap{position:relative;width:140px;height:140px;flex:0 0 140px}
  .ring-wrap .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring-wrap .pct b{font-size:32px;font-weight:800;font-family:var(--mono);letter-spacing:-.02em}
  .ring-wrap .pct span{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:2px}
  .hero-info{flex:1;min-width:180px}
  .hero-info .big{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .hero-info .streak{font-size:46px;font-weight:800;line-height:1;letter-spacing:-.04em;margin:4px 0 2px;background:linear-gradient(90deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  .chip{font-size:11px;color:var(--muted);background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:99px;padding:5px 12px}
  .chip b{color:var(--text);font-family:var(--mono)}

  .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:13px}
  .tile{background:linear-gradient(180deg,var(--card),var(--bg-2));border:1px solid var(--border);border-radius:var(--r-sm);padding:16px 17px;transition:.15s;position:relative;overflow:hidden}
  .tile:hover{border-color:var(--border-2);transform:translateY(-2px)}
  .tile.big{grid-column:span 2}
  @media (max-width:600px){.tile.big{grid-column:span 1}}
  .tile .n{font-size:27px;font-weight:800;font-family:var(--mono);font-variant-numeric:tabular-nums;line-height:1;letter-spacing:-.02em}
  .tile .n.money{font-size:30px}
  .tile .n.accent{background:linear-gradient(90deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .tile .n.gold{color:var(--gold)}
  .tile .n.good{color:var(--good)}
  .tile .n.teal{color:var(--teal)}
  .tile .n.bad{color:var(--bad)}
  .tile .l{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:10px;font-weight:500}
  .tile .sub{font-size:10.5px;color:var(--faint);margin-top:3px}

  .meter{margin-bottom:16px}.meter:last-child{margin-bottom:0}
  .track{height:8px;background:var(--bg);border-radius:99px;overflow:hidden;border:1px solid var(--border)}
  .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:99px;transition:width .6s cubic-bezier(.2,.8,.2,1)}

  .funnel{display:flex;flex-direction:column;gap:9px}
  .fstep{display:grid;grid-template-columns:120px 1fr auto;align-items:center;gap:14px}
  .fstep .fl{font-size:12.5px;color:var(--muted)}
  .fbar-track{height:26px;background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden;position:relative}
  .fbar{height:100%;border-radius:7px;transition:width .6s cubic-bezier(.2,.8,.2,1);min-width:2px}
  .fstep .fv{font-family:var(--mono);font-size:13px;font-weight:600;min-width:78px;text-align:right}
  .fstep .fv small{color:var(--faint);font-weight:400;font-size:11px}

  .disc{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:2px}
  .disc li{display:flex;align-items:center;gap:12px;padding:10px 9px;border-radius:9px;cursor:pointer;transition:background .12s}
  .disc li:hover{background:rgba(255,255,255,.035)}
  .box{width:20px;height:20px;flex:0 0 20px;border:1.5px solid var(--border-2);border-radius:7px;display:grid;place-items:center;transition:.14s}
  .box svg{width:11px;height:11px;stroke:#04121a;stroke-width:3.2;opacity:0;fill:none}
  .disc li.done .box,.ai.done .box,.box.done{background:linear-gradient(135deg,var(--good),#6ff0bd);border-color:var(--good)}
  .disc li.done .box svg,.box.done svg{opacity:1}
  .disc li.done .lbl{color:var(--muted)}
  .disc .lbl{flex:1;font-size:13.5px}

  .addrow{display:flex;gap:9px;margin-top:14px}
  .hb-addrow{border:1px dashed var(--border-2);border-radius:11px;padding:8px 8px 8px 12px}
  .hb-addrow input{background:transparent}
  .addrow input,.inp{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:10px 13px;font-size:13px;color:var(--text)}
  .addrow input:focus,.inp:focus{outline:none;border-color:var(--accent)}
  .btn{background:var(--card-2);border:1px solid var(--border-2);color:var(--text);border-radius:9px;padding:10px 15px;font-size:12.5px;font-weight:500;cursor:pointer;transition:.13s;white-space:nowrap}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.solid{background:linear-gradient(135deg,var(--accent),var(--accent-2));border:none;color:#fff;box-shadow:0 4px 14px rgba(91,140,255,.3)}
  .btn.solid:hover{filter:brightness(1.1);color:#fff}
  a.track-btn{text-decoration:none;display:inline-flex;align-items:center;gap:7px}
  a.track-btn svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2}
  .rm{opacity:0;background:none;border:none;color:var(--faint);cursor:pointer;font-size:18px;line-height:1;padding:0 4px}
  li:hover .rm,.ai:hover .rm{opacity:.7}.rm:hover{color:var(--bad);opacity:1}
  .pill{font-size:11px;font-weight:500;padding:4px 11px;border-radius:99px;display:inline-flex;align-items:center;gap:6px}
  .pill .d{width:7px;height:7px;border-radius:99px;background:currentColor}
  .pill.live{color:var(--good);background:var(--good-soft)}
  .pill.off{color:var(--muted);background:rgba(255,255,255,.05)}
  .pill.err{color:var(--bad);background:var(--bad-soft)}
  .pill .d.live{animation:pulse 1.8s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  .seg{display:inline-flex;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:3px}
  .seg button{background:none;border:none;color:var(--muted);padding:6px 13px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:500;transition:.12s}
  .seg button.on{background:var(--card-2);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.3)}

  .bars{display:flex;align-items:stretch;gap:6px;height:150px;margin-top:8px}
  .bar-wrap{flex:1;height:100%;display:flex;flex-direction:column;align-items:center;min-width:0}
  .bar-col{flex:1;width:100%;display:flex;align-items:flex-end;justify-content:center}
  .bar{width:100%;max-width:30px;min-height:3px;background:var(--border-2);border-radius:5px 5px 0 0;transition:height .6s cubic-bezier(.2,.8,.2,1);position:relative}
  .bar.on{background:linear-gradient(180deg,var(--accent),var(--accent-2))}
  .bar.hit{background:linear-gradient(180deg,var(--good),#6ff0bd)}
  .bar-lbl{font-size:9.5px;color:var(--muted);margin-top:7px;white-space:nowrap}
  .bar-val{font-size:9px;color:var(--faint);margin-bottom:4px;white-space:nowrap}

  .seth-quote{margin:2px 0 20px;padding:11px 0 11px 16px;border-left:2px solid var(--border-2);color:var(--muted);font-size:13px;font-style:italic;line-height:1.5;max-width:640px}
  .seth-quote b{display:block;font-style:normal;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-top:6px;font-weight:600}

  .hb-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:18px}
  @media(max-width:600px){.hb-summary{grid-template-columns:1fr}}
  .hbcard{background:linear-gradient(180deg,var(--card),var(--bg-2));border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;display:flex;align-items:center;gap:15px;box-shadow:var(--shadow)}
  .hbcard .mini-ring{position:relative;width:56px;height:56px;flex:0 0 56px}
  .hbcard .mini-ring .mp{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text);z-index:1}
  .hbcard .hbc-info .hbc-n{font-size:22px;font-weight:800;letter-spacing:-.02em;font-family:var(--mono)}
  .hbcard .hbc-info .hbc-l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}

  .hb-hero{background:radial-gradient(120% 120% at 100% 0,rgba(245,199,107,.1),transparent 55%),linear-gradient(150deg,var(--card-hi),var(--card));border:1px solid var(--border-2);display:flex;gap:28px;align-items:center;flex-wrap:wrap}
  .hb-hero-info{flex:1;min-width:200px}
  .hb-streak-row{display:flex;align-items:baseline;gap:12px}
  .hb-streak-num{font-size:52px;font-weight:800;line-height:1;letter-spacing:-.03em;background:linear-gradient(90deg,var(--gold),#f5915e);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hb-streak-lbl{font-size:13px;color:var(--muted);font-weight:600}
  .chip.hb-chip-lg{font-size:12.5px;padding:7px 15px}
  .chip.hb-chip-lg b{font-size:15px;margin-right:5px}
  .chip.hb-chip-lg b.good{color:var(--good)}.chip.hb-chip-lg b.accent{color:var(--accent)}.chip.hb-chip-lg b.warn{color:var(--warn)}
  .bar-lbl.today{color:var(--accent);font-weight:700}

  .hcards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
  .hcard2{background:linear-gradient(180deg,var(--card),var(--bg-2));border:1px solid var(--border);border-radius:var(--r);padding:17px 18px;box-shadow:var(--shadow);transition:border-color .15s}
  .hcard2:hover{border-color:var(--border-2)}
  .hc2-top{display:flex;align-items:center;gap:9px;margin-bottom:14px}
  .hlabel2{flex:1;min-width:0;background:none;border:1px solid transparent;border-radius:7px;color:var(--text);font-family:var(--sans);font-size:14.5px;font-weight:600;padding:5px 7px;transition:.12s}

  .nw-v{font-family:var(--mono);font-size:14px;font-weight:600}

  /* MONEY page */
  .money-hero{background:radial-gradient(120% 120% at 100% 0,rgba(62,224,153,.1),transparent 55%),linear-gradient(150deg,var(--card-hi),var(--card));border:1px solid var(--border-2)}
  .mh-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:10px}
  .mh-big{font-size:46px;font-weight:800;font-family:var(--mono);letter-spacing:-.03em;line-height:1;margin-bottom:22px}
  .mh-fields{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  @media(max-width:720px){.mh-fields{grid-template-columns:1fr 1fr}}
  .mh-field{display:flex;flex-direction:column;gap:7px}
  .mh-k{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:600;position:relative;padding-left:12px}
  .mh-k::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:99px;background:var(--c,var(--accent))}
  .mh-input{display:flex;align-items:center;gap:2px;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:10px 12px;font-family:var(--mono);color:var(--muted)}
  .mh-input:focus-within{border-color:var(--accent)}
  .mh-input input{background:none;border:none;color:var(--text);font-family:var(--mono);font-size:15px;font-weight:600;width:100%;padding:0}
  .mh-input input:focus{outline:none}

  /* TASKS page — execution engine */
  .current-focus-card{background:radial-gradient(120% 120% at 0 0,rgba(91,140,255,.12),transparent 55%),linear-gradient(150deg,var(--card-hi),var(--card));border:1px solid var(--border-2);padding:24px}
  .cf-top{display:flex;justify-content:space-between;align-items:center}
  .cf-eyebrow{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .cf-name{font-size:23px;font-weight:800;letter-spacing:-.015em;margin:10px 0 12px;line-height:1.3}
  .cf-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .cf-actions{display:flex;gap:10px}
  .cf-timer{font-family:var(--mono);font-weight:700;color:var(--accent);background:var(--accent-soft)}
  .cf-empty .cf-empty-txt{color:var(--faint);font-size:14px;margin:12px 0 16px}
  .focus-mode-wrap{max-width:560px;margin:0 auto}
  .focus-mode-wrap .current-focus-card{padding:36px}
  .focus-mode-wrap .cf-name{font-size:30px}

  .et-list{display:flex;flex-direction:column;gap:2px}
  .et-row{display:flex;align-items:center;gap:12px;padding:11px 6px;border-bottom:1px solid var(--border)}
  .et-row:last-child{border-bottom:none}
  .et-row.completed .et-name{color:var(--muted);text-decoration:line-through}
  .et-main{flex:1;min-width:0}
  .et-name{font-size:14px;font-weight:500}
  .et-meta{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap}
  .et-chip{font-size:10.5px;font-family:var(--mono);background:var(--card-2);border:1px solid var(--border);border-radius:99px;padding:2px 9px;color:var(--muted)}
  .et-chip.et-est{color:var(--faint)}
  .et-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
  .et-iconbtn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:7px;width:26px;height:26px;font-size:12px;cursor:pointer;transition:.13s;display:inline-flex;align-items:center;justify-content:center}
  .et-iconbtn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
  .et-iconbtn:disabled{opacity:.25;cursor:default}
  .et-projsel{background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:11px;padding:4px 6px;max-width:120px}
  .et-status-tag{font-size:10px;color:var(--accent);background:var(--accent-soft);padding:3px 9px;border-radius:99px;font-weight:600}

  .qa-panel{position:relative;width:min(440px,92vw);background:linear-gradient(180deg,var(--card),var(--bg-2));border:1px solid var(--border-2);border-radius:16px;box-shadow:0 24px 70px rgba(0,0,0,.6);padding:22px}
  .qa-title{font-size:16px;font-weight:700;margin-bottom:14px}
  .qa-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .qa-est-row{display:flex;gap:8px;margin-bottom:18px}
  .qa-est-chip{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px;font-size:12px;cursor:pointer;transition:.13s}
  .qa-est-chip.on{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
  .qa-actions{display:flex;justify-content:flex-end;gap:10px}

  /* habit weight input */
  .hname{display:flex;align-items:center;gap:8px}
  .hwt{display:inline-flex;align-items:center;gap:3px;margin-left:auto;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:2px 6px}
  .hwt input.hweight{width:26px;background:none;border:none;color:var(--accent);font-family:var(--mono);font-size:12px;font-weight:700;text-align:right;padding:0}
  .hwt input.hweight:focus{outline:none}
  .hwt .hwt-lbl{font-size:9px;color:var(--faint);text-transform:uppercase}
  .hname input.hlabel{flex:1;min-width:60px}
  .disc-w{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--faint);font-weight:600}
  .disc li.done .disc-w{color:var(--good)}

  /* DISCREET DAY NOTE */
  .day-note{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:0 2px}
  .day-note input{flex:1;background:none;border:none;border-bottom:1px solid var(--border);color:var(--muted);font-size:12.5px;padding:7px 2px;transition:.15s}
  .day-note input::placeholder{color:var(--faint)}
  .day-note input:hover{border-bottom-color:var(--border-2)}
  .day-note input:focus{outline:none;border-bottom-color:var(--accent);color:var(--text)}
  .day-note.has-note input{color:var(--text)}
  .dn-saved{flex-shrink:0}

  /* WEEKLY REVIEW */
  .wk-nav{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px}
  .wk-title{text-align:center;font-size:16px;font-weight:700;display:flex;flex-direction:column;gap:2px}
  .wk-title span{font-family:var(--mono);font-size:11px;color:var(--muted);font-weight:400;letter-spacing:.02em}
  .wk-disc{display:flex;flex-direction:column;gap:11px}
  .wk-disc-row{display:grid;grid-template-columns:130px 1fr 44px;align-items:center;gap:12px}
  .wk-disc-label{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .wk-disc-track{height:8px;background:var(--bg);border:1px solid var(--border);border-radius:99px;overflow:hidden}
  .wk-disc-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:99px;transition:width .5s}
  .wk-disc-val{font-family:var(--mono);font-size:12px;color:var(--muted);text-align:right}
  .wk-notes{margin-top:16px;padding-top:14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
  .wk-notes-hdr{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);font-weight:600;margin-bottom:2px}
  .wk-note{display:flex;gap:10px;font-size:12.5px;line-height:1.45}
  .wk-note-day{flex-shrink:0;font-family:var(--mono);font-size:11px;color:var(--muted);width:42px}
  .wk-note-txt{color:var(--text)}
  .wk-journal .wk-j-field{margin-bottom:14px}
  .wk-journal .wk-j-field:last-child{margin-bottom:0}
  .wk-journal label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:7px}
  .wk-journal textarea.write{min-height:70px}

  /* HEAD TRASH */
  .headtrash-launch{display:flex;align-items:center;justify-content:space-between;gap:16px;cursor:pointer;transition:border-color .15s,transform .15s}
  .headtrash-launch:hover{border-color:var(--border-2);transform:translateY(-2px)}
  .htl-left{display:flex;align-items:center;gap:14px}
  .htl-icon{width:40px;height:40px;flex:0 0 40px;border-radius:11px;background:var(--bad-soft);display:grid;place-items:center}
  .htl-icon svg{width:20px;height:20px;stroke:var(--bad);fill:none;stroke-width:1.8}
  .htl-title{font-size:16px;font-weight:700;letter-spacing:-.01em}
  .htl-sub{font-size:12px;color:var(--muted);margin-top:2px}
  .htl-open{font-size:12px;color:var(--accent);font-weight:500;white-space:nowrap}
  .ht-panel{padding-bottom:0}
  .ht-panel .ht-add{display:flex;gap:9px;padding:0 22px 16px}
  .ht-panel .ht-add input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:12px 15px;font-size:14px;color:var(--text)}
  .ht-panel .ht-add input:focus{outline:none;border-color:var(--bad)}
  .ht-scroll{flex:1;overflow-y:auto;padding:0 22px 22px}
  .ht-scroll::-webkit-scrollbar{width:8px}.ht-scroll::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:4px}
  .ht-list{display:flex;flex-direction:column;gap:9px}
  .ht-item{display:flex;align-items:flex-start;gap:12px;background:var(--bg);border:1px solid var(--border);border-radius:11px;padding:13px 15px}
  .ht-body{flex:1;min-width:0}
  .ht-text{font-size:14px;line-height:1.5}
  .ht-time{font-size:10.5px;color:var(--faint);margin-top:5px;font-family:var(--mono)}
  .ht-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
  .ht-flip{background:none;border:1px solid var(--border-2);color:var(--good);font-size:11px;padding:5px 10px;border-radius:8px;cursor:pointer;transition:.13s;white-space:nowrap}
  .ht-flip:hover{background:var(--good-soft);border-color:var(--good)}
  .ht-del{align-self:center}
  .ht-item.inverting{display:block;border-color:var(--good);background:linear-gradient(180deg,var(--good-soft),var(--bg))}
  .ht-invert{display:flex;flex-direction:column;gap:10px}
  .hti-original{font-size:13px}
  .hti-strike{color:var(--faint);text-decoration:line-through;text-decoration-color:var(--border-2)}
  .hti-arrow{font-size:11px;letter-spacing:.03em;color:var(--good);font-weight:600}
  .hti-input{width:100%;background:var(--bg);border:1px solid var(--good);border-radius:9px;color:var(--text);font-family:var(--sans);font-size:14.5px;line-height:1.5;padding:11px 13px;resize:vertical}
  .hti-input:focus{outline:none;box-shadow:0 0 0 3px var(--good-soft)}
  .hti-actions{display:flex;gap:8px}
  .hti-actions .btn{font-size:12px;padding:8px 14px}

  /* COACHING EXPAND + MODAL */
  .co-expand{margin-left:auto;background:none;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:4px 10px;border-radius:7px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:.13s}
  .co-expand svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
  .co-expand:hover{border-color:var(--accent);color:var(--accent)}
  .co-notes-lbl{display:flex;align-items:center}
  textarea.co-note-area{min-height:200px;max-height:340px}
  .note-modal{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:28px}
  .nm-backdrop{position:absolute;inset:0;background:rgba(4,5,8,.72);backdrop-filter:blur(4px)}
  .nm-panel{position:relative;width:min(860px,100%);height:min(80vh,760px);background:linear-gradient(180deg,var(--card),var(--bg-2));border:1px solid var(--border-2);border-radius:16px;box-shadow:0 24px 70px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden}
  .nm-head{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:18px 22px;border-bottom:1px solid var(--border)}
  .nm-title{font-size:16px;font-weight:700;display:flex;flex-direction:column;gap:2px}
  .nm-title .nm-sub{font-size:11px;font-weight:400;color:var(--muted);letter-spacing:.02em}
  .nm-actions{display:flex;align-items:center;gap:12px}
  .nm-area{flex:1;width:100%;background:none;border:none;color:var(--text);font-family:var(--sans);font-size:16px;line-height:1.7;padding:22px;resize:none}
  .nm-area:focus{outline:none}

  @media (max-width:780px){
    .shell{flex-direction:column}
    .rail{position:static;width:auto;height:auto;flex-direction:row;flex-wrap:wrap;padding:12px;gap:4px}
    .brand{width:100%;padding:4px 8px 8px}
    .navbtn{flex:1 1 28%;justify-content:center;padding:9px}
    .navbtn.active::before{display:none}
    .rail-foot{display:none}
    main{padding:20px}
    .topbar{padding:14px 20px}
  }

  /* ===== HABITS v2 ===== */
  .h2-hero{display:flex;gap:34px;align-items:center;flex-wrap:wrap;
    background:radial-gradient(120% 120% at 100% 0,rgba(91,140,255,.13),transparent 55%),linear-gradient(150deg,var(--card-hi),var(--card));
    border:1px solid var(--border-2);padding:30px}
  .h2-ring{width:168px;height:168px;flex:0 0 168px}
  .h2-ring .pct b{font-size:44px}
  .h2-hero-info{flex:1;min-width:220px}
  .h2-eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .h2-remaining{font-size:34px;font-weight:800;letter-spacing:-.03em;margin:8px 0 4px;line-height:1.1}
  .h2-remsub{font-size:14px;color:var(--muted)}
  .chip.hb-chip-lg b.gold{color:var(--gold)}

  .h2-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
  .h2-card{position:relative;overflow:hidden;text-align:left;font-family:inherit;cursor:pointer;
    background:linear-gradient(180deg,var(--card),var(--bg-2));border:1px solid var(--border);
    border-radius:16px;padding:18px;transition:transform .16s,border-color .16s,box-shadow .16s;display:flex;flex-direction:column;gap:6px}
  .h2-card:hover{transform:translateY(-3px);border-color:var(--hc);box-shadow:0 10px 28px rgba(0,0,0,.3)}
  .h2-card-top{display:flex;justify-content:space-between;align-items:center}
  .h2-icon{font-size:26px;line-height:1}
  .h2-pts{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--muted);background:rgba(255,255,255,.05);border:1px solid var(--border);padding:4px 10px;border-radius:99px}
  .h2-name{font-size:16.5px;font-weight:700;color:var(--text);letter-spacing:-.01em}
  .h2-status{font-size:11.5px;color:var(--faint)}
  .h2-cta{margin-top:10px}
  .h2-card.done{border-color:var(--good);background:linear-gradient(180deg,var(--good-soft),var(--bg-2));box-shadow:0 0 0 1px rgba(62,224,153,.25),0 8px 26px rgba(62,224,153,.12)}
  .h2-card.done .h2-pts{color:var(--good);background:var(--good-soft)}
  .h2-card.done .h2-name{color:var(--good)}

  .h2-card.pop{animation:h2pop .42s cubic-bezier(.2,1.4,.3,1)}
  @keyframes h2pop{0%{transform:scale(1)}40%{transform:scale(1.045)}100%{transform:scale(1)}}
  .pt-float{position:fixed;z-index:9999;pointer-events:none;font-family:var(--mono);font-weight:800;font-size:22px;color:var(--good);
    text-shadow:0 0 14px rgba(62,224,153,.6);transform:translate(-50%,0);animation:ptfly .9s ease-out forwards}
  @keyframes ptfly{0%{opacity:0;transform:translate(-50%,0) scale(.8)}20%{opacity:1;transform:translate(-50%,-10px) scale(1.1)}100%{opacity:0;transform:translate(-50%,-70px) scale(1)}}

  .h2-week{display:flex;gap:10px;justify-content:space-between}
  .h2-day{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;padding:6px 0;border-radius:10px;transition:.13s}
  .h2-day:hover:not(:disabled){background:rgba(255,255,255,.04)}
  .h2-day:disabled{opacity:.35;cursor:default}
  .h2-day-dot{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border-2);background:var(--bg);transition:.2s}
  .h2-day.part .h2-day-dot{background:var(--warn);border-color:var(--warn)}
  .h2-day.hit .h2-day-dot{background:var(--accent);border-color:var(--accent)}
  .h2-day.perfect .h2-day-dot{background:linear-gradient(135deg,var(--good),#6ff0bd);border-color:var(--good);box-shadow:0 0 12px rgba(62,224,153,.5)}
  .h2-day.istoday .h2-day-dot{box-shadow:0 0 0 3px var(--accent-soft)}
  .h2-day.sel .h2-day-dot{outline:2px solid var(--accent);outline-offset:2px}
  .h2-day-lbl{font-size:10.5px;color:var(--muted);font-weight:600}
  .h2-day-detail:not(:empty){margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
  .h2-dd-head{font-size:12.5px;color:var(--muted);margin-bottom:10px}
  .h2-dd-head b{color:var(--text);font-family:var(--mono)}
  .h2-dd-list{display:flex;flex-wrap:wrap;gap:7px}
  .h2-dd-pill{font-size:11.5px;padding:5px 11px;border-radius:99px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--faint)}
  .h2-dd-pill.on{color:var(--good);background:var(--good-soft);border-color:rgba(62,224,153,.3)}

  .h2-lib{display:flex;flex-direction:column;gap:2px}
  .h2-lib-row{display:flex;align-items:center;gap:13px;padding:12px 8px;border-radius:11px;cursor:pointer;transition:background .12s}
  .h2-lib-row:hover{background:rgba(255,255,255,.035)}
  .h2-lib-icon{font-size:20px}
  .h2-lib-main{flex:1;min-width:0}
  .h2-lib-name{font-size:14.5px;font-weight:600;margin-bottom:6px}
  .h2-lib-week{display:flex;gap:5px}
  .h2-mini{width:9px;height:9px;border-radius:50%;background:var(--bg);border:1px solid var(--border)}
  .h2-mini.on{background:var(--hc);border-color:var(--hc)}
  .h2-lib-streak{font-family:var(--mono);font-size:12px;color:var(--gold)}
  .h2-lib-chev{color:var(--faint);font-size:18px}

  .h2-detail-hero{display:flex;align-items:center;gap:18px;border:1px solid var(--border-2);
    background:linear-gradient(150deg,var(--card-hi),var(--card))}
  .h2-detail-icon{font-size:40px}
  .h2-detail-name{background:none;border:1px solid transparent;border-radius:8px;font-size:22px;font-weight:800;color:var(--text);width:100%;padding:4px 8px;letter-spacing:-.02em}
  .h2-detail-name:focus{outline:none;border-color:var(--accent);background:var(--bg)}
  .h2-detail-sub{font-size:12.5px;color:var(--muted);margin-top:4px;padding-left:8px}
  .h2-detail-sub b{color:var(--text);font-family:var(--mono)}
  .h2-heat{display:grid;grid-template-columns:repeat(13,1fr);gap:5px}
  .h2-heat-cell{aspect-ratio:1;border-radius:4px;background:var(--bg);border:1px solid var(--border);cursor:pointer;transition:.12s}
  .h2-heat-cell:hover{transform:scale(1.25);border-color:var(--border-2)}

  /* ===== DRAG ===== */
  .drag-grip{color:var(--faint);font-size:14px;cursor:grab;opacity:0;transition:opacity .12s;flex:0 0 auto;line-height:1;user-select:none}
  .h2-lib-row:hover .drag-grip,.mo-line:hover .drag-grip,.et-row:hover .drag-grip{opacity:.5}
  .drag-grip:active{cursor:grabbing}
  .dragging{opacity:.4}
  .vcard{cursor:grab}
  .vcard:active{cursor:grabbing}

  @media (max-width:600px){
    .h2-cards{grid-template-columns:1fr 1fr}
    .h2-hero{padding:22px;gap:22px}
    .h2-ring{width:130px;height:130px;flex:0 0 130px}
    .h2-ring .pct b{font-size:34px}
    .h2-remaining{font-size:27px}
    .h2-heat{grid-template-columns:repeat(10,1fr)}
    .drag-grip{opacity:.45}
  }




  /* ===== PROJECTS v2 ===== */
  .proj-stack{display:flex;flex-direction:column;gap:10px}
  .proj-block{border:1px solid var(--border);border-radius:13px;background:var(--bg);overflow:hidden;transition:border-color .14s}
  .proj-block:hover{border-color:var(--border-2)}
  .proj-block.collapsed{background:none}
  .proj-head{display:flex;align-items:center;gap:11px;padding:12px 13px}
  .proj-info{flex:1;min-width:0}
  .proj-name-inp{width:100%;background:none;border:1px solid transparent;border-radius:7px;color:var(--text);
    font-family:var(--sans);font-size:14.5px;font-weight:600;padding:4px 7px;margin-bottom:6px;transition:.12s}
  .proj-name-inp:hover{border-color:var(--border)}
  .proj-name-inp:focus{outline:none;border-color:var(--accent);background:var(--bg-2)}
  .proj-track{height:5px;background:var(--bg-2);border:1px solid var(--border);border-radius:99px;overflow:hidden;margin-left:7px}
  .proj-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.2,.8,.2,1)}

  .proj-body{padding:0 13px 11px}

  .proj-done-toggle:hover{color:var(--muted)}
  .proj-done-list{opacity:.6;padding-bottom:4px}
  .addrow.proj-add{margin-top:8px}

  .addrow.proj-add input:focus{border-style:solid;border-color:var(--accent);background:var(--bg-2)}
  .addrow.proj-new{margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}

  /* task rows */
  .et-name{cursor:text;border-radius:5px;padding:1px 4px;margin-left:-4px;transition:background .12s}
  .et-row:hover .et-name{background:rgba(255,255,255,.04)}
  .et-rename{flex:1;min-width:0;background:var(--bg-2);border:1px solid var(--accent);border-radius:7px;
    color:var(--text);font-family:var(--sans);font-size:14px;padding:5px 8px;width:100%}
  .et-rename:focus{outline:none}
  .et-actions{opacity:.35;transition:opacity .13s}
  .et-row:hover .et-actions,.et-row:focus-within .et-actions{opacity:1}
  .et-iconbtn.act-focus:hover{border-color:var(--accent-2);color:var(--accent-2)}
  .et-iconbtn.act-next:hover{border-color:var(--teal);color:var(--teal)}
  .et-status-tag.focus{background:var(--accent-soft);color:var(--accent)}
  .et-hint{font-size:11px;margin-top:10px;color:var(--muted)}
  .et-hint.warn{color:var(--warn)}
  .et-projsel{cursor:pointer}
  .et-projsel:hover{border-color:var(--accent);color:var(--text)}

  /* toast */
  .et-toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:10001;
    display:flex;align-items:center;gap:14px;padding:12px 18px;border-radius:11px;
    background:var(--card-hi);border:1px solid var(--border-2);box-shadow:0 12px 40px rgba(0,0,0,.55);
    font-size:13px;color:var(--text);animation:toastIn .18s cubic-bezier(.2,.9,.3,1);max-width:min(440px,92vw)}
  .et-toast.warn{border-color:rgba(242,181,68,.4);color:var(--warn)}
  .et-toast-undo{background:none;border:none;color:var(--accent);font-family:inherit;font-size:12.5px;
    font-weight:600;cursor:pointer;padding:0;white-space:nowrap}
  .et-toast-undo:hover{text-decoration:underline}
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
  /* ===== EMOJI PICKER ===== */
  .icon-btn{background:var(--bg);border:1px solid var(--border);border-radius:10px;cursor:pointer;
    font-size:19px;line-height:1;padding:0;width:38px;height:38px;display:inline-grid;place-items:center;
    transition:.14s;flex:0 0 38px;position:relative}
  .icon-btn:hover{border-color:var(--accent);background:var(--accent-soft);transform:translateY(-1px)}
  .icon-btn::after{content:"▾";position:absolute;right:2px;bottom:0;font-size:8px;color:var(--faint);line-height:1}
  .icon-btn:hover::after{color:var(--accent)}
  .proj-icon.icon-btn{width:34px;height:34px;flex:0 0 34px;font-size:18px;background:none;border-color:transparent}
  .proj-head:hover .proj-icon.icon-btn{border-color:var(--border)}
  .proj-icon.icon-btn:hover{border-color:var(--accent);background:var(--accent-soft)}

  .emoji-pop{position:fixed;z-index:10000;width:300px;max-height:360px;display:flex;flex-direction:column;
    background:linear-gradient(180deg,var(--card),var(--bg-2));border:1px solid var(--border-2);
    border-radius:14px;box-shadow:0 20px 56px rgba(0,0,0,.62);overflow:hidden;
    animation:epIn .14s cubic-bezier(.2,.9,.3,1)}
  @keyframes epIn{from{opacity:0;transform:translateY(-6px) scale(.98)}to{opacity:1;transform:none}}
  .ep-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;
    border-bottom:1px solid var(--border);font-size:11px;letter-spacing:.07em;text-transform:uppercase;
    color:var(--muted);font-weight:600;flex-shrink:0}
  .ep-close{background:none;border:none;color:var(--faint);font-size:19px;line-height:1;cursor:pointer;padding:0 2px}
  .ep-close:hover{color:var(--bad)}
  .ep-body{flex:1;overflow-y:auto;padding:12px 14px}
  .ep-body::-webkit-scrollbar{width:7px}
  .ep-body::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:4px}
  .ep-group{margin-bottom:14px}
  .ep-group:last-child{margin-bottom:0}

    font-weight:700;margin-bottom:7px}

  .ep-item:hover{background:var(--accent-soft);border-color:var(--accent);transform:scale(1.18)}

  .ep-custom::placeholder{color:var(--faint);font-size:12px}
  /* ===== WEEK PACE ===== */
  .h2-pace{border:1px solid var(--border-2);position:relative;overflow:hidden;padding:24px}
  .h2-pace::before{content:"";position:absolute;inset:0 0 auto;height:3px;opacity:.9}
  .h2-pace.ahead::before,.h2-pace.locked::before{background:linear-gradient(90deg,var(--good),#6ff0bd)}
  .h2-pace.behind::before{background:linear-gradient(90deg,var(--warn),#f5915e)}
  .h2-pace.lost::before{background:linear-gradient(90deg,var(--bad),#f5915e)}
  .h2-pace.ahead,.h2-pace.locked{background:radial-gradient(130% 140% at 100% 0,rgba(62,224,153,.09),transparent 60%),linear-gradient(150deg,var(--card-hi),var(--card))}
  .h2-pace.behind{background:radial-gradient(130% 140% at 100% 0,rgba(242,181,68,.09),transparent 60%),linear-gradient(150deg,var(--card-hi),var(--card))}
  .h2-pace.lost{background:radial-gradient(130% 140% at 100% 0,rgba(242,106,94,.08),transparent 60%),linear-gradient(150deg,var(--card-hi),var(--card))}

  .h2-pace-grid{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:22px}

  .h2-pace-side{flex-shrink:0}

  .h2-pc-n span{font-size:13px;color:var(--muted);font-weight:600;letter-spacing:0}
  .h2-pace-callout.locked .h2-pc-n{font-size:21px;color:var(--good)}
  .h2-pace-callout.lost .h2-pc-n{color:var(--bad)}
  .h2-pc-l{font-size:10.5px;color:var(--muted);margin-top:6px;letter-spacing:.02em}

  .h2-pace-bars{position:relative;display:flex;gap:9px;margin-bottom:20px}
  .h2-pb{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
  .h2-pb-col{height:84px;display:flex;align-items:flex-end;background:var(--bg);border:1px solid var(--border);border-radius:7px;overflow:hidden}
  .h2-pb-fill{width:100%;border-radius:0 0 6px 6px;transition:height .6s cubic-bezier(.2,.8,.2,1)}
  .h2-pb.good .h2-pb-fill{background:linear-gradient(180deg,var(--good),#2fb87d)}
  .h2-pb.under .h2-pb-fill{background:linear-gradient(180deg,var(--warn),#d99a2e)}
  .h2-pb.zero .h2-pb-fill{background:var(--border-2)}
  .h2-pb.future .h2-pb-col{border-style:dashed;opacity:.45}
  .h2-pb-lbl{text-align:center;font-size:10px;color:var(--muted);font-weight:600;margin-top:7px}
  .h2-pb.now .h2-pb-lbl{color:var(--accent);font-weight:800}
  .h2-pb.now .h2-pb-col{border-color:var(--accent)}
  .h2-pace-line{position:absolute;left:0;right:0;top:calc(84px - (84px * 0.8));height:0;border-top:1px dashed var(--border-2);pointer-events:none;z-index:2}
  .h2-pace-line span{position:absolute;right:-2px;top:-15px;font-size:9px;font-family:var(--mono);color:var(--faint);background:var(--card-hi);padding:1px 5px;border-radius:4px;border:1px solid var(--border)}

  .h2-pace-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding-top:17px;border-top:1px solid var(--border)}
  .h2-ps{display:flex;flex-direction:column;gap:4px;min-width:0}

  .h2-ps-of{font-size:12px;color:var(--faint);font-weight:500}
  .h2-ps span{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-weight:500}
  @media (max-width:640px){
    .h2-pace{padding:20px}
    .h2-pace-grid{flex-direction:column;gap:16px}
    .h2-pace-side{width:100%}
    .h2-pace-callout{text-align:left;min-width:0}
    .h2-pace-avg{font-size:42px}
    .h2-pace-stats{grid-template-columns:1fr 1fr;gap:16px}
  }
  /* ===== CARD STATE CLARITY ===== */
  .h2-card{border-width:1.5px}
  .h2-card .h2-icon{filter:grayscale(.55);opacity:.72;transition:.18s}
  .h2-card.done .h2-icon{filter:none;opacity:1}
  .h2-cta-btn{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;letter-spacing:.02em;
    padding:7px 13px;border-radius:8px;border:1px solid var(--border-2);color:var(--text);background:rgba(255,255,255,.05);transition:.14s}
  .h2-card:hover .h2-cta-btn{border-color:var(--hc);color:var(--hc);background:rgba(255,255,255,.08)}
  .h2-cta-btn.undo{border-color:transparent;background:none;color:var(--faint);padding-left:0;font-weight:500}
  .h2-card.done:hover .h2-cta-btn.undo{color:var(--muted);background:none;border-color:transparent}
  .h2-card.done .h2-status{color:var(--good);font-weight:600}
  .h2-card.done .h2-pts{color:var(--good);background:var(--good-soft);border-color:rgba(62,224,153,.35)}
  .h2-check{position:absolute;top:14px;right:14px;width:22px;height:22px;border-radius:50%;
    background:linear-gradient(135deg,var(--good),#6ff0bd);display:grid;place-items:center;
    box-shadow:0 2px 10px rgba(62,224,153,.45);animation:h2check .3s cubic-bezier(.2,1.5,.4,1)}
  .h2-check svg{width:12px;height:12px;stroke:#04121a;stroke-width:3.4;fill:none}
  @keyframes h2check{0%{transform:scale(0) rotate(-45deg)}100%{transform:scale(1) rotate(0)}}
  .h2-card.done .h2-card-top .h2-pts{margin-right:30px}

  /* ===== EDITABLE DAY DETAIL ===== */
  .h2-dd-head{display:flex;justify-content:space-between;align-items:baseline;gap:12px;font-size:13px;color:var(--muted);margin-bottom:4px}
  .h2-dd-head b{color:var(--text);font-family:var(--mono);font-size:14px}
  .h2-dd-hint{font-size:11px;color:var(--faint);margin-bottom:12px}
  .h2-dd-pill{display:inline-flex;align-items:center;gap:8px;font-family:inherit;cursor:pointer;
    font-size:12.5px;padding:8px 13px;border-radius:99px;background:rgba(255,255,255,.04);
    border:1px solid var(--border);color:var(--muted);transition:.13s}
  .h2-dd-pill:hover{border-color:var(--border-2);color:var(--text);transform:translateY(-1px)}
  .h2-dd-pill.on{color:var(--good);background:var(--good-soft);border-color:rgba(62,224,153,.35);font-weight:600}
  .h2-dd-pill.on:hover{border-color:var(--good)}
  .h2-dd-pts{font-family:var(--mono);font-size:10.5px;opacity:.65}
  .h2-day{position:relative}
  .h2-day:hover:not(:disabled) .h2-day-dot{transform:scale(1.12)}

  /* ===== DATED HEATMAP ===== */
  .h2-heat{display:grid;grid-template-columns:repeat(13,1fr);gap:6px}
  .h2-heat-cell{position:relative;aspect-ratio:1;border-radius:7px;background:var(--bg);
    border:1px solid var(--border);cursor:pointer;transition:.12s;display:grid;place-items:center;
    padding:0;font-family:var(--mono);overflow:visible}
  .h2-heat-cell:hover{transform:scale(1.12);border-color:var(--border-2);z-index:3}
  .h2-heat-num{font-size:10.5px;color:var(--faint);font-weight:500;transition:.12s;line-height:1}
  .h2-heat-cell.on .h2-heat-num{color:#04121a;font-weight:700;opacity:.85}
  .h2-heat-cell.monthstart{border-color:var(--border-2)}
  .h2-heat-mon{position:absolute;top:-13px;left:0;font-size:8.5px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--muted);font-family:var(--sans);font-weight:700;white-space:nowrap}
  .h2-heat-cell.istoday{box-shadow:0 0 0 2px var(--accent)}
  .h2-heat-cell.istoday .h2-heat-num{color:var(--accent);font-weight:700}
  .h2-heat-cell.on.istoday .h2-heat-num{color:#04121a}
  .h2-heat-legend{display:flex;gap:16px;margin-top:16px;padding-top:13px;border-top:1px solid var(--border)}
  .h2-heat-key{display:inline-flex;align-items:center;gap:7px;font-size:11px;color:var(--faint)}
  .h2-heat-swatch{width:12px;height:12px;border-radius:4px;background:var(--bg);border:1px solid var(--border)}
  @media (max-width:600px){
    .h2-heat{grid-template-columns:repeat(7,1fr);gap:7px}
    .h2-heat-num{font-size:11px}
  }
</style>
</head>

<script>
/* ============================================================
   PERSONAL OS
   Sales = live from Poppy Firebase (poppy/log:Mo, field v = JSON string)
   Everything else = local via window.storage
   ============================================================ */
const FIREBASE = {
  config:{
    apiKey:"AIzaSyCYCt9-opphzCOSInAaPnrGIBN8M6kWW-Y",
    authDomain:"poppy-sales.firebaseapp.com",
    projectId:"poppy-sales",
    storageBucket:"poppy-sales.firebasestorage.app",
    messagingSenderId:"575070387533",
    appId:"1:575070387533:web:8971533228a1e60caf8b04"
  },
  collection:"poppy",
  doc:"log:Mo",
  field:"v",
  trackerUrl:"https://poppysales.netlify.app/"
};

const STORE_KEY='os:v1';
const OS_DOC={collection:"poppy",doc:"os:Mo",field:"v"};
const _mem={};
let _fbDb=null;
async function fbInit(){
  if(_fbDb)return _fbDb;
  const base='https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/';
  if(!window.firebase){
    await loadScript(base+'firebase-app-compat.js');
    await loadScript(base+'firebase-firestore-compat.js');
  }
  if(!firebase.apps.length)firebase.initializeApp(FIREBASE.config);
  _fbDb=firebase.firestore();
  return _fbDb;
}
const store={
  async get(k){
    try{
      const db=await fbInit();
      const doc=await db.collection(OS_DOC.collection).doc(OS_DOC.doc).get();
      if(doc.exists){const v=doc.data()[OS_DOC.field];if(v!=null){_mem[k]=v;return v;}}
    }catch(e){console.warn('store.get failed',e);}
    return _mem[k]??null;
  },
  async set(k,v){
    _mem[k]=v;
    try{
      const db=await fbInit();
      await db.collection(OS_DOC.collection).doc(OS_DOC.doc).set({[OS_DOC.field]:v});
    }catch(e){console.warn('store.set failed',e);}
  }
};

const pad=n=>String(n).padStart(2,'0');
const keyOf=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
const today=()=>keyOf(new Date());
function addDays(k,n){const [y,m,d]=k.split('-').map(Number);const x=new Date(y,m-1,d);x.setDate(x.getDate()+n);return keyOf(x);}
const dow=k=>{const [y,m,d]=k.split('-').map(Number);return ['Su','Mo','Tu','We','Th','Fr','Sa'][new Date(y,m-1,d).getDay()];};
const shortDate=k=>{const p=k.split('-');return Number(p[1])+'/'+Number(p[2]);};
function longDate(k){const [y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d).toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});}
function daysUntil(s){const [y,m,d]=s.split('-').map(Number);const t=new Date(y,m-1,d),n=new Date();n.setHours(0,0,0,0);return Math.round((t-n)/864e5);}
function fmt(n){return Number(n||0).toLocaleString();}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function clip(s,n){s=(s||'').trim();return s.length>n?s.slice(0,n)+'…':s;}

const DEFAULT={
  wsName:"MO OS", name:"Mo",
  disciplines:[
    {id:"d1",label:"Gym",weight:30},
    {id:"d2",label:"Slept & woke on time",weight:25},
    {id:"d3",label:"Tracked calories",weight:20},
    {id:"d5",label:"Closing call review",weight:15},
    {id:"d4",label:"Supplements",weight:10}

function dayRatio(k){const r=S.days[k];if(!r||!r.disc||!S.disciplines.length)return 0;return S.disciplines.filter(d=>r.disc[d.id]).length/S.disciplines.length;}
function dayDone(k){const r=S.days[k];if(!r||!r.disc)return 0;return S.disciplines.filter(d=>r.disc[d.id]).length;}
function streak(){let n=0,k=today();if(dayScore(k)<60)k=addDays(k,-1);while(dayScore(k)>=60){n++;k=addDays(k,-1);}return n;}
function habitStreak(id){let n=0,k=today();const has=x=>S.days[x]&&S.days[x].disc&&S.days[x].disc[id];if(!has(k))k=addDays(k,-1);while(has(k)){n++;k=addDays(k,-1);}return n;}
function bestStreak(id){
  const hit=Object.keys(S.days).filter(k=>S.days[k].disc&&S.days[k].disc[id]).sort();
  if(!hit.length)return 0;
  let best=1,cur=1;
  for(let i=1;i<hit.length;i++){cur=addDays(hit[i-1],1)===hit[i]?cur+1:1;if(cur>best)best=cur;}
  return best;
}
function rangeDates(n){const a=[];for(let i=n-1;i>=0;i--)a.push(addDays(today(),-i));return a;}
function avgRatio(dates){if(!dates.length)return 0;let s=0;dates.forEach(k=>s+=dayRatio(k));return s/dates.length;}
function avgScore(dates){if(!dates.length)return 0;let s=0;dates.forEach(k=>s+=dayScore(k));return s/dates.length;}
function habitPct(id,dates){if(!dates.length)return 0;let c=0;dates.forEach(k=>{if(S.days[k]&&S.days[k].disc&&S.days[k].disc[id])c++;});return c/dates.length;}
function discWeight(d){return Number(d.weight)||0;}
function totalWeight(){return S.disciplines.reduce((s,d)=>s+discWeight(d),0);}
function dayScore(k){
  // weighted score 0-100 for a given day
  const tw=totalWeight();if(!tw)return 0;
  const r=S.days[k];const disc=(r&&r.disc)||{};
  const earned=S.disciplines.reduce((s,d)=>s+(disc[d.id]?discWeight(d):0),0);
  return Math.round(earned/tw*100);
}
function scoreBreakdown(k){
  const r=S.days[k];const disc=(r&&r.disc)||{};
  return S.disciplines.slice().sort((a,b)=>discWeight(b)-discWeight(a)).map(d=>({
    id:d.id,label:d.label,weight:discWeight(d),done:!!disc[d.id]
  }));
}

function salesInRange(startK,endK){const out=[];Object.keys(FB.days).forEach(k=>{if(k>=startK&&k<=endK)out.push(FB.days[k]);});return out;}
function sumSales(rows){

}
function weekBounds(){const t=today();const start=addDays(t,-((new Date().getDay()+6)%7));return {start,end:t,label:'this week'};}
function monthBounds(){const t=today();return {start:t.slice(0,8)+'01',end:t,label:'this month'};}
function allBounds(){const ks=Object.keys(FB.days).sort();return {start:ks[0]||today(),end:ks[ks.length-1]||today(),label:'all time'};}
// Monday-anchored week helpers
function weekStartOf(k){const [y,m,d]=k.split('-').map(Number);const dt=new Date(y,m-1,d);const off=(dt.getDay()+6)%7;return addDays(k,-off);}
function weekKey(k){return weekStartOf(k);} // key a week by its Monday
function weekDays(startK){const a=[];for(let i=0;i<7;i++)a.push(addDays(startK,i));return a;}
function weekLabel(startK){const end=addDays(startK,6);const s=startK.split('-'),e=end.split('-');return `${Number(s[1])}/${Number(s[2])} – ${Number(e[1])}/${Number(e[2])}`;}
function htTime(ts){const d=new Date(ts);const now=new Date();const sameDay=d.toDateString()===now.toDateString();const t=d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});return sameDay?('Today · '+t):d.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' · '+t;}

let _ringSeq=0;
function ring(pct,size,stroke,idSuffix){
  pct=Math.max(0,Math.min(1,Number(pct)||0));
  const r=(size/2)-stroke, C=2*Math.PI*r, off=C*(1-pct), c=size/2, gid='rg_'+(idSuffix||'x')+'_'+(++_ringSeq);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${c}" cy="${c}" r="${r}" stroke="var(--border)" stroke-width="${stroke}" fill="none"/>
    <circle cx="${c}" cy="${c}" r="${r}" stroke="url(#${gid})" stroke-width="${stroke}" fill="none" stroke-linecap="round" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 ${c} ${c})" style="transition:stroke-dashoffset .6s cubic-bezier(.2,.8,.2,1)"/>
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="var(--accent)"/><stop offset="1" stop-color="var(--accent-2)"/></linearGradient></defs>

const EST_CHIPS=[{v:null,l:'—'},{v:15,l:'15m'},{v:30,l:'30m'},{v:60,l:'1h'}];
let execFocusMode=false;
let execExpandedProject=null;
let execTimerInt=null;
let execAddModalState=null; // {status,projectId} when quick-add modal is open
let execCollapsed={};   // projectId -> true when hidden
let execShowDone={};    // projectId -> true when completed tasks revealed

function execData(){
  if(!S.exec)S.exec={tasks:{},nextOrder:[],projects:[],focusId:null};
  if(!S.exec.tasks)S.exec.tasks={};
  if(!S.exec.nextOrder)S.exec.nextOrder=[];
  if(!S.exec.projects)S.exec.projects=[];
  if(S.exec.focusId===undefined)S.exec.focusId=null;
  if(!S.exec.migrated){
    (S.tasks||[]).forEach(t=>{
      if(t.done)return;
      const id='t'+Date.now()+Math.random().toString(36).slice(2,7);
      S.exec.tasks[id]={id,name:t.text,projectId:null,status:'inbox',est:null,notes:'',ts:Date.now(),startedAt:null,completedAt:null};
    });
    S.exec.migrated=true;
    S.tasks=[];
    save();
  }
  return S.exec;
}
function execTask(id){return execData().tasks[id];}
function execProjectOf(t){if(!t||!t.projectId)return null;return execData().projects.find(p=>p.id===t.projectId)||null;}
function execInbox(){return Object.values(execData().tasks).filter(t=>t.status==='inbox'&&!t.projectId).sort((a,b)=>b.ts-a.ts);}
function execProjectTasks(pid){return Object.values(execData().tasks).filter(t=>t.projectId===pid);}
function execProjectProgress(pid){const ts=execProjectTasks(pid);const done=ts.filter(t=>t.status==='completed').length;return {done,total:ts.length,pct:ts.length?Math.round(done/ts.length*100):0};}

function execAddTask(opts){
  const E=execData();
  const id='t'+Date.now()+Math.random().toString(36).slice(2,7);
  const t={id,name:opts.name.trim(),projectId:opts.projectId||null,status:opts.status||'inbox',est:opts.est||null,notes:'',ts:Date.now(),startedAt:null,completedAt:null};
  E.tasks[id]=t;
  let warning=null;
  if(t.status==='next'){
    if(E.nextOrder.length>=5){t.status='inbox';warning='Up Next already has 5 — added to Inbox instead.';}
    else E.nextOrder.push(id);
  }else if(t.status==='current'){
    if(E.focusId){t.status='inbox';warning='Current Focus is already taken — added to Inbox instead.';}
    else E.focusId=id;
  }
  return {task:t,warning};
}
function execPromoteToNext(id){
  const E=execData();const t=E.tasks[id];if(!t)return{ok:false};
  if(t.status==='next')return{ok:true};
  if(E.nextOrder.length>=5)return{ok:false,warning:'Up Next already has 5 — finish or remove one first.'};
  t.status='next';E.nextOrder.push(id);return{ok:true};
}
function execPromoteToFocus(id){
  const E=execData();const t=E.tasks[id];if(!t)return{ok:false};
  if(E.focusId&&E.focusId!==id)return{ok:false,warning:'Complete the current focus first.'};
  E.nextOrder=E.nextOrder.filter(x=>x!==id);
  t.status='current';E.focusId=id;return{ok:true};
}
function execStartFocus(){const E=execData();if(!E.focusId)return;const t=E.tasks[E.focusId];if(t&&!t.startedAt)t.startedAt=Date.now();}
function execCompleteTask(id){
  const E=execData();const t=E.tasks[id];if(!t)return;
  t.status='completed';t.completedAt=Date.now();
  E.nextOrder=E.nextOrder.filter(x=>x!==id);
  if(E.focusId===id){
    E.focusId=null;
    const nid=E.nextOrder.shift();
    if(nid){const nt=E.tasks[nid];if(nt){nt.status='current';E.focusId=nid;}}
  }
}
function execSendToInbox(id){
  const E=execData();const t=E.tasks[id];if(!t)return;
  t.status='inbox';E.nextOrder=E.nextOrder.filter(x=>x!==id);
  if(E.focusId===id)E.focusId=null;
}
function execDeleteTask(id){
  const E=execData();delete E.tasks[id];
  E.nextOrder=E.nextOrder.filter(x=>x!==id);
  if(E.focusId===id)E.focusId=null;
}
function execMoveNext(id,dir){
  const E=execData();const i=E.nextOrder.indexOf(id);if(i<0)return;
  const j=i+dir;if(j<0||j>=E.nextOrder.length)return;
  [E.nextOrder[i],E.nextOrder[j]]=[E.nextOrder[j],E.nextOrder[i]];
}

  {n:'Life',e:['🏠','✈️','🌍','🚗','🛒','🍽️','☕','🎬','🎵','🎮','📚','🎨','🐕','🌱','🎁','👨‍👩‍👦','💬','🕌','🌅','🏝️']},

];
let emojiPickerFor=null; // 'new' | project id

function openEmojiPicker(target,anchorEl){
  closeEmojiPicker();
  emojiPickerFor=target;
  const pop=document.createElement('div');
  pop.className='emoji-pop';pop.id='emoji-pop';
  pop.innerHTML=`
    <div class="ep-head">
      <span>Pick an icon</span>
      <button class="ep-close" type="button">×</button>
    </div>
    <div class="ep-body">
      ${EMOJI_SETS.map(g=>`
        <div class="ep-group">
          <div class="ep-group-name">${g.n}</div>
          <div class="ep-grid">${g.e.map(x=>`<button class="ep-item" type="button" data-e="${x}">${x}</button>`).join('')}</div>
        </div>`).join('')}
    </div>
    <div class="ep-foot">
      <input class="ep-custom" placeholder="or paste any emoji" maxlength="4">
    </div>`;
  document.body.appendChild(pop);

  // position under the anchor, kept inside the viewport
  const r=anchorEl.getBoundingClientRect();
  const w=300,h=Math.min(360,window.innerHeight-40);
  let left=r.left, top=r.bottom+8;
  if(left+w>window.innerWidth-12)left=window.innerWidth-w-12;
  if(left<12)left=12;
  if(top+h>window.innerHeight-12)top=Math.max(12,r.top-h-8);
  pop.style.left=left+'px';pop.style.top=top+'px';

  const pick=v=>{applyEmoji(target,v);closeEmojiPicker();};
  pop.querySelectorAll('.ep-item').forEach(b=>b.onclick=e=>{e.stopPropagation();pick(b.dataset.e);});
  pop.querySelector('.ep-close').onclick=e=>{e.stopPropagation();closeEmojiPicker();};
  const custom=pop.querySelector('.ep-custom');
  custom.onkeydown=e=>{
    e.stopPropagation();
    if(e.key==='Enter'){const v=custom.value.trim();if(v)pick(v);}
    if(e.key==='Escape')closeEmojiPicker();
  };
  pop.onclick=e=>e.stopPropagation();
  setTimeout(()=>{
    document.addEventListener('click',closeEmojiPicker,{once:true});
    document.addEventListener('keydown',epEsc);
  },0);
}
function epEsc(e){if(e.key==='Escape')closeEmojiPicker();}
function closeEmojiPicker(){
  const p=document.getElementById('emoji-pop');
  if(p)p.remove();
  document.removeEventListener('keydown',epEsc);
  emojiPickerFor=null;
}
function applyEmoji(target,val){
  if(target==='new'){
    const btn=document.getElementById('proj-icon-btn');
    if(btn){btn.dataset.icon=val;btn.textContent=val;}
    return;
  }
  const p=execData().projects.find(x=>x.id===target);
  if(p){p.icon=val;save();renderTasks();}
}

function execAddProject(name,icon){const E=execData();const id='p'+Date.now();E.projects.push({id,name:name.trim(),icon:icon||'📁'});return id;}
function execDeleteProject(id){
  const E=execData();E.projects=E.projects.filter(p=>p.id!==id);
  Object.values(E.tasks).forEach(t=>{if(t.projectId===id)t.projectId=null;});
}
function estLabel(v){const c=EST_CHIPS.find(x=>x.v===v);return c?c.l:null;}
function elapsedStr(ms){const s=Math.floor(ms/1000);const m=Math.floor(s/60);const r=s%60;return pad(m)+':'+pad(r);}

function execTaskRow(t,opts){
  opts=opts||{};
  const proj=execProjectOf(t);
  const done=t.status==='completed';
  const chips=`${proj&&!opts.hideProject?`<span class="et-chip" style="color:${execProjColor(proj.id)}">${proj.icon} ${esc(proj.name)}</span>`:''}${t.est?`<span class="et-chip et-est">${estLabel(t.est)}</span>`:''}`;
  return `<div class="et-row ${done?'completed':''}" data-id="${t.id}">
    ${opts.drag?'<span class="drag-grip">⠿</span>':''}
    <span class="box et-complete ${done?'done':''}"><svg viewBox="0 0 24 24"><path d="M4 12l6 6L20 6"/></svg></span>
    <div class="et-main"><div class="et-name">${esc(t.name)}</div>${chips?`<div class="et-meta">${chips}</div>`:''}</div>
    <div class="et-actions">${opts.actions||''}</div>
  </div>`;
}
const PROJ_COLORS=['var(--accent)','var(--accent-2)','var(--teal)','var(--gold)','var(--good)','var(--warn)'];
function execProjColor(pid){const E=execData();const i=E.projects.findIndex(p=>p.id===pid);return PROJ_COLORS[Math.max(0,i)%PROJ_COLORS.length];}

function renderTasks(){
  const E=execData();

        ${!focus?`<button class="et-iconbtn act-focus" data-focus="${t.id}" title="Work on this now">🎯</button>`:''}
        <button class="et-iconbtn" data-inbox="${t.id}" title="Remove from Up Next">↩</button>
      `})).join('')}</div>`:'<div class="empty">Nothing queued. Hit → on any task below to line it up.</div>'}
      ${nextTasks.length>=5?'<div class="et-hint warn">Up Next is full. Finish or remove one to add another.</div>':''}
    </div>

    <div class="card" style="margin-bottom:16px">
      <h3>Projects <span class="h3sub">${E.projects.length?openAcrossProjects()+' open':'none yet'}</span></h3>

      <div class="addrow proj-new"><button type="button" class="icon-btn" id="proj-icon-btn" data-icon="📁" title="Choose an icon">📁</button><input id="proj-name" placeholder="New project name" style="flex:1"><button class="btn" id="proj-add-btn">Add project</button></div>

      ${inbox.length?`<div class="et-list scroll" id="et-dump-list" style="max-height:340px">${inbox.map(t=>execTaskRow(t,{hideProject:true,drag:true,actions:`
        <select class="et-projsel" data-id="${t.id}" title="Move to a project"><option value="">📥 No project</option>${E.projects.map(p=>`<option value="${p.id}">${p.icon} ${esc(p.name)}</option>`).join('')}</select>

function execCurrentFocusCard(focus,big){
  if(!focus){
    return `<div class="card current-focus-card cf-empty">
      <div class="cf-eyebrow">🎯 Current focus</div>
      <div class="cf-empty-txt">Nothing in focus right now.</div>
      <button class="btn solid" id="cf-pick">Pull from Up Next</button>
    </div>`;
  }
  const proj=execProjectOf(focus);
  const started=!!focus.startedAt;
  return `<div class="card current-focus-card">
    <div class="cf-top">
      <div class="cf-eyebrow">🎯 Current focus</div>
      ${!big?`<button class="et-iconbtn" id="cf-mode-btn" title="Focus mode">⛶</button>`:''}
    </div>
    <div class="cf-name">${esc(focus.name)}</div>
    <div class="cf-meta">${proj?`<span class="et-chip" style="color:${execProjColor(proj.id)}">${proj.icon} ${esc(proj.name)}</span>`:''}${focus.est?`<span class="et-chip et-est">${estLabel(focus.est)}</span>`:''}${started?`<span class="et-chip cf-timer" id="cf-timer">${elapsedStr(Date.now()-focus.startedAt)}</span>`:''}</div>
    <div class="cf-actions">
      ${!started?`<button class="btn solid" id="cf-start">▶ Start focus</button>`:''}
      <button class="btn ${started?'solid':''}" id="cf-complete">✓ Complete</button>
    </div>
  </div>`;
}
function wireFocusCard(focus){
  const startBtn=document.getElementById('cf-start');
  if(startBtn)startBtn.onclick=()=>{execStartFocus();save();renderTasks();};
  const compBtn=document.getElementById('cf-complete');
  if(compBtn)compBtn.onclick=()=>{if(focus){execCompleteTask(focus.id);save();renderTasks();}};
  const pickBtn=document.getElementById('cf-pick');
  if(pickBtn)pickBtn.onclick=()=>{const E=execData();const nid=E.nextOrder[0];if(nid){execPromoteToFocus(nid);save();renderTasks();}};
  clearInterval(execTimerInt);
  if(focus&&focus.startedAt){
    execTimerInt=setInterval(()=>{const el=document.getElementById('cf-timer');if(el)el.textContent=elapsedStr(Date.now()-focus.startedAt);},1000);
  }
}
function openAcrossProjects(){
  return Object.values(execData().tasks).filter(t=>t.projectId&&t.status!=='completed').length;
}

function execProjectCard(p){
  const prog=execProjectProgress(p.id);
  const all=execProjectTasks(p.id);
  const open=all.filter(t=>t.status!=='completed').sort((a,b)=>a.ts-b.ts);
  const done=all.filter(t=>t.status==='completed');
  const collapsed=execCollapsed[p.id];
  const showDone=execShowDone[p.id];
  return `<div class="proj-block ${collapsed?'collapsed':''}">
    <div class="proj-head">
      <button type="button" class="proj-icon icon-btn" data-picon="${p.id}" title="Change icon">${p.icon}</button>
      <div class="proj-info">
        <input class="proj-name-inp" data-pname="${p.id}" value="${esc(p.name)}" spellcheck="false">
        <div class="proj-track"><div class="proj-fill" style="width:${prog.pct}%;background:${execProjColor(p.id)}"></div></div>
      </div>
      <span class="proj-count">${prog.done}/${prog.total}</span>
      <button class="et-iconbtn proj-collapse" data-toggle="${p.id}" title="${collapsed?'Show tasks':'Hide tasks'}">${collapsed?'▸':'▾'}</button>
      <button class="rm proj-del-btn" data-delproj="${p.id}" title="Delete project">×</button>
    </div>
    ${collapsed?'':`<div class="proj-body">
      ${open.length?`<div class="et-list proj-list" data-plist="${p.id}">${open.map(t=>execTaskRow(t,{hideProject:true,drag:true,actions:execRowActions(t)})).join('')}</div>`:'<div class="empty proj-empty">Nothing open here.</div>'}
      ${done.length?`<button class="proj-done-toggle" data-showdone="${p.id}">${showDone?'▾':'▸'} ${done.length} completed</button>${showDone?`<div class="et-list proj-done-list">${done.map(t=>execTaskRow(t,{hideProject:true,actions:`<button class="rm" data-del="${t.id}">×</button>`})).join('')}</div>`:''}`:''}
      <div class="addrow proj-add"><input class="proj-task-add" data-pid="${p.id}" placeholder="+ Add task to ${esc(p.name)}"></div>
    </div>`}
  </div>`;
}

// One consistent action set on every open task, everywhere it appears
function execRowActions(t){
  const E=execData();

  const isFocus=t.status==='current';
  if(isFocus)return `<span class="et-status-tag focus">in focus</span>`;
  return `
    ${inNext
      ? `<span class="et-status-tag">up next</span><button class="et-iconbtn" data-inbox="${t.id}" title="Remove from Up Next">↩</button>`
      : `<button class="et-iconbtn act-next" data-next="${t.id}" title="Add to Up Next">→</button>`}
    ${!E.focusId?`<button class="et-iconbtn act-focus" data-focus="${t.id}" title="Work on this now">🎯</button>`:''}
    <button class="rm" data-del="${t.id}">×</button>`;
}

function wireTasksView(){
  const E=execData();
  const focus=E.focusId?E.tasks[E.focusId]:null;
  wireFocusCard(focus);
  const modeBtn=document.getElementById('cf-mode-btn');if(modeBtn)modeBtn.onclick=()=>{execFocusMode=true;renderTasks();};

  main.querySelectorAll('.et-row').forEach(row=>{
    const id=row.dataset.id;
    const c=row.querySelector('.et-complete');
    if(c)c.onclick=e=>{e.stopPropagation();execCompleteTask(id);save();renderTasks();};
    // click the name to rename in place
    const nm=row.querySelector('.et-name');
    if(nm)nm.onclick=e=>{e.stopPropagation();startRenameTask(id,nm);};
  });

  main.querySelectorAll('[data-focus]').forEach(b=>b.onclick=e=>{
    e.stopPropagation();
    const r=execPromoteToFocus(b.dataset.focus);
    if(r&&r.warning)return etToast(r.warning,'warn');
    save();renderTasks();
  });
  main.querySelectorAll('[data-inbox]').forEach(b=>b.onclick=e=>{e.stopPropagation();execSendToInbox(b.dataset.inbox);save();renderTasks();});
  main.querySelectorAll('[data-next]').forEach(b=>b.onclick=e=>{
    e.stopPropagation();
    const r=execPromoteToNext(b.dataset.next);
    if(r&&r.warning)return etToast(r.warning,'warn');
    save();renderTasks();
  });
  main.querySelectorAll('[data-del]').forEach(b=>b.onclick=e=>{
    e.stopPropagation();
    const t=execTask(b.dataset.del);
    execDeleteTask(b.dataset.del);save();renderTasks();
    if(t)etToast('Deleted "'+clip(t.name,28)+'"','undo',()=>{
      const E2=execData();E2.tasks[t.id]=t;
      if(t.status==='next'&&!E2.nextOrder.includes(t.id))E2.nextOrder.push(t.id);
      if(t.status==='current')E2.focusId=t.id;
      save();renderTasks();
    });
  });
  main.querySelectorAll('.et-projsel').forEach(sel=>sel.onchange=e=>{
    e.stopPropagation();
    const t=execTask(sel.dataset.id);
    if(t){t.projectId=sel.value||null;save();renderTasks();
      if(sel.value){const p=E.projects.find(x=>x.id===sel.value);if(p)etToast('Moved to '+p.icon+' '+p.name);}}
  });

  const iaInp=document.getElementById('inbox-add'),iaBtn=document.getElementById('inbox-add-btn');
  if(iaInp){
    const add=()=>{const v=iaInp.value.trim();if(!v)return;execAddTask({name:v,status:'inbox'});save();renderTasks();
      const n=document.getElementById('inbox-add');if(n)n.focus();};
    iaBtn.onclick=add;iaInp.onkeydown=e=>{if(e.key==='Enter')add();};
  }

  // project header: collapse, rename, delete, completed toggle
  main.querySelectorAll('[data-toggle]').forEach(el=>el.onclick=e=>{
    e.stopPropagation();
    const pid=el.dataset.toggle;
    execCollapsed[pid]=!execCollapsed[pid];
    renderTasks();
  });
  main.querySelectorAll('[data-showdone]').forEach(el=>el.onclick=e=>{
    e.stopPropagation();
    const pid=el.dataset.showdone;
    execShowDone[pid]=!execShowDone[pid];
    renderTasks();
  });
  main.querySelectorAll('[data-pname]').forEach(inp=>{
    inp.onclick=e=>e.stopPropagation();
    inp.onchange=()=>{
      const p=E.projects.find(x=>x.id===inp.dataset.pname);
      if(p){p.name=inp.value.trim()||p.name;save();renderTasks();}
    };
    inp.onkeydown=e=>{if(e.key==='Enter')inp.blur();};
  });
  main.querySelectorAll('[data-delproj]').forEach(b=>b.onclick=e=>{
    e.stopPropagation();
    const pid=b.dataset.delproj;
    const n=execProjectTasks(pid).filter(t=>t.status!=='completed').length;
    const p=E.projects.find(x=>x.id===pid);
    if(confirm(`Delete "${p?p.name:'this project'}"?`+(n?`\n\n${n} open task${n>1?'s':''} will move to Brain dump.`:''))){
      execDeleteProject(pid);save();renderTasks();
    }
  });

  // per-project add: enter keeps focus so you can rattle off several
  main.querySelectorAll('.proj-task-add').forEach(inp=>{
    inp.onclick=e=>e.stopPropagation();
    inp.onkeydown=e=>{
      if(e.key!=='Enter')return;
      const v=inp.value.trim();if(!v)return;
      const pid=inp.dataset.pid;
      execAddTask({name:v,status:'inbox',projectId:pid});
      save();renderTasks();
      const again=main.querySelector(`.proj-task-add[data-pid="${pid}"]`);
      if(again)again.focus();
    };
  });

  const projAddBtn=document.getElementById('proj-add-btn');
  const projNameInp=document.getElementById('proj-name');
  const addProj=()=>{
    const name=projNameInp.value.trim();if(!name)return;
    const iconBtn=document.getElementById('proj-icon-btn');
    const icon=(iconBtn&&iconBtn.dataset.icon)||'📁';
    execAddProject(name,icon);save();renderTasks();
  };
  if(projAddBtn)projAddBtn.onclick=addProj;
  if(projNameInp)projNameInp.onkeydown=e=>{if(e.key==='Enter')addProj();};

  const pib=document.getElementById('proj-icon-btn');
  if(pib)pib.onclick=e=>{e.stopPropagation();openEmojiPicker('new',pib);};
  main.querySelectorAll('[data-picon]').forEach(b=>b.onclick=e=>{
    e.stopPropagation();
    openEmojiPicker(b.dataset.picon,b);
  });

  // drag: Up Next, brain dump, and inside each project
  makeSortable(document.getElementById('et-next-list'),'.et-row',ids=>{
    E.nextOrder=ids.filter(id=>E.tasks[id]);
    save();renderTasks();
  });
  makeSortable(document.getElementById('et-dump-list'),'.et-row',ids=>{
    const base=Date.now();
    ids.forEach((id,i)=>{const t=E.tasks[id];if(t)t.ts=base-i;});
    save();
  });
  main.querySelectorAll('[data-plist]').forEach(list=>{
    makeSortable(list,'.et-row',ids=>{
      const base=Date.now();
      ids.forEach((id,i)=>{const t=E.tasks[id];if(t)t.ts=base-i;});
      save();
    });
  });

  const qaBtn=document.getElementById('et-quickadd');
  if(qaBtn)qaBtn.onclick=()=>openQuickAdd();
  wireQuickAddModal();
}

// Rename a task inline without opening a modal
function startRenameTask(id,el){
  const t=execTask(id);if(!t)return;
  const row=el.closest('.et-row');
  if(row.querySelector('.et-rename'))return;
  const inp=document.createElement('input');
  inp.className='et-rename';inp.value=t.name;
  el.replaceWith(inp);
  inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);
  const commit=()=>{
    const v=inp.value.trim();
    if(v&&v!==t.name){t.name=v;save();}
    renderTasks();
  };
  inp.onblur=commit;
  inp.onclick=e=>e.stopPropagation();
  inp.onkeydown=e=>{
    e.stopPropagation();
    if(e.key==='Enter'){e.preventDefault();inp.blur();}
    if(e.key==='Escape'){inp.onblur=null;renderTasks();}
  };
}

// Small toast, with an optional undo action
let _toastT=null;
function etToast(msg,kind,undoFn){
  const old=document.getElementById('et-toast');if(old)old.remove();
  clearTimeout(_toastT);
  const el=document.createElement('div');
  el.id='et-toast';el.className='et-toast '+(kind==='warn'?'warn':'');
  el.innerHTML=`<span>${esc(msg)}</span>${undoFn?'<button class="et-toast-undo">Undo</button>':''}`;
  document.body.appendChild(el);
  if(undoFn){
    el.querySelector('.et-toast-undo').onclick=()=>{clearTimeout(_toastT);el.remove();undoFn();};
  }
  _toastT=setTimeout(()=>el.remove(),kind==='undo'?6000:3200);
}

function openQuickAdd(presets){

// Global keyboard shortcuts for the execution engine
document.addEventListener('keydown',e=>{
  const typing=['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName);

  if(e.key==='n'&&!typing&&!execAddModalState){e.preventDefault();openQuickAdd();}

    const E=execData();if(E.focusId){const t=E.tasks[E.focusId];if(t&&!t.startedAt){e.preventDefault();execStartFocus();save();renderTasks();}}
  }
});

const HABIT_ICONS=['🏋️','🌙','🔥','💊','💰','📞','🧠','🥗','📖','🚿'];
let habitDetail=null; // discipline id when drilled in

function habitIcon(d,i){return d.icon||HABIT_ICONS[i%HABIT_ICONS.length];}
function habitColor(d,i){return d.color||HDOTS[i%HDOTS.length];}
function perfectDays(dates){return dates.filter(k=>dayScore(k)>=100).length;}
function completedAt(k,id){const r=S.days[k];return r&&r.times&&r.times[id]?r.times[id]:null;}
function timeLabel(ts){if(!ts)return'';return new Date(ts).toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});}

function toggleHabit(k,id){
  const r=dayRec(k);
  r.times=r.times||{};
  const now=!r.disc[id];
  r.disc[id]=now;
  if(now)r.times[id]=Date.now();else delete r.times[id];
  return now;
}

const MONTHS_SHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const WEEK_TARGET=80; // % goal for the week

function weekPace(){
  const k=today();
  const all=weekDays(weekStartOf(k));
  const elapsed=all.filter(x=>x<=k);
  const remaining=all.filter(x=>x>k).length;
  const earned=elapsed.reduce((s,x)=>s+dayScore(x),0);
  const avg=elapsed.length?Math.round(earned/elapsed.length):0;

  const weekGoal=WEEK_TARGET*7;              // 560 pts to close at 80%
  const shouldHave=WEEK_TARGET*elapsed.length;
  const diff=earned-shouldHave;              // +/- vs pace right now
  const left=Math.max(0,weekGoal-earned);    // pts still needed

  // What the remaining days must average. Today is already banked in `earned`,
  // so this is purely about the days ahead.
  const needed=remaining>0?Math.ceil(left/remaining):0;
  const locked=left<=0;                      // target already secured
  const impossible=!locked&&remaining>0&&needed>100;
  const state=locked?'locked':impossible?'lost':diff>=0?'ahead':'behind';

  // Projected finish if the rest of the week matches the current average
  const projected=Math.round((earned+avg*remaining)/7);

  return {avg,earned,weekGoal,left,diff,needed,remaining,
    elapsed:elapsed.length,state,projected,locked,impossible,
    perfect:elapsed.filter(x=>dayScore(x)>=100).length,
    days:all.map(x=>({k:x,score:x<=k?dayScore(x):null,future:x>k}))};
}

function avgCompletionLabel(id){
  const mins=[];
  Object.keys(S.days).forEach(k=>{
    const t=completedAt(k,id);

  });
  if(!mins.length)return '—';
  const avg=Math.round(mins.reduce((a,b)=>a+b,0)/mins.length);
  return pad(Math.floor(avg/60))+':'+pad(avg%60);
}

/* ===== SORTABLE ===== */
function makeSortable(container,rowSel,onDrop){
  if(!container)return;
  let dragEl=null;
  container.querySelectorAll(rowSel).forEach(row=>{
    row.draggable=true;
    row.addEventListener('dragstart',e=>{dragEl=row;row.classList.add('dragging');e.dataTransfer.effectAllowed='move';try{e.dataTransfer.setData('text/plain','');}catch(_){}});
    row.addEventListener('dragend',()=>{
      row.classList.remove('dragging');
      const ids=[...container.querySelectorAll(rowSel)].map(r=>r.dataset.id);
      dragEl=null;onDrop(ids);
    });
    row.addEventListener('dragover',e=>{
      e.preventDefault();
      if(!dragEl||dragEl===row)return;
      const r=row.getBoundingClientRect();
      const after=(e.clientY-r.top)/r.height>.5;
      container.insertBefore(dragEl,after?row.nextSibling:row);
    });
  });
}
