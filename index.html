/* Paste your Zapier "Catch Hook" webhook URL here */
const ZAP_WEBHOOK_URL='https://hooks.zapier.com/hooks/catch/27212587/443o22l/';

async function pullFromFathom(s){
  if(!s.link){alert('Add the Fathom link first.');return;}
  if(ZAP_WEBHOOK_URL.includes('PASTE_YOUR')){alert('Set ZAP_WEBHOOK_URL in the code first.');return;}
  const btn=document.getElementById('co-pull-btn'),status=document.getElementById('co-pull-status');
  btn.disabled=true;status.textContent='Sending to Zapier…';
  try{
    await fetch(ZAP_WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({sessionId:s.id,url:s.link})});
  }catch(e){status.textContent='Could not reach Zapier — check the webhook URL.';btn.disabled=false;return;}
  status.textContent='Processing transcript… usually 20–40s';
  const db=await fbInit();
  const start=Date.now();
  const poll=setInterval(async()=>{
    if(Date.now()-start>90000){clearInterval(poll);status.textContent='Timed out — check the Zap history for errors.';btn.disabled=false;return;}
    try{
      const doc=await db.collection('coaching_results').doc(s.id).get();
      if(doc.exists&&doc.data().status==='ready'){
        clearInterval(poll);
        const d=doc.data();
        s.moNotes=s.moNotes?s.moNotes+'\n\n'+d.notes:d.notes;
        (d.actions||[]).forEach(t=>{s.actions=s.actions||[];s.actions.push({id:'a'+Date.now()+Math.random().toString(36).slice(2,6),text:t,set:today(),due:'',done:false});});
        save();renderCoaching();
        status.textContent='Done — notes added.';btn.disabled=false;
        db.collection('coaching_results').doc(s.id).delete().catch(()=>{});
      }
    }catch(e){/* keep polling */}
  },4000);
}

/* Full-screen note editor modal */
function openNoteModal(session,which){
  const isSeth=which==='seth';
  const title=isSeth?"Seth's notes":"Mo's notes";
  const val=isSeth?session.sethNotes:session.moNotes;
  const existing=document.getElementById('note-modal');if(existing)existing.remove();
  const modal=document.createElement('div');
  modal.id='note-modal';modal.className='note-modal';
  modal.innerHTML=`
    <div class="nm-backdrop"></div>
    <div class="nm-panel">
      <div class="nm-head">
        <div class="nm-title">${title}<span class="nm-sub">${esc(session.title||'Untitled session')} · ${longDate(session.date)}</span></div>
        <div class="nm-actions"><span class="saved" id="nm-saved">Saved</span><button class="btn nm-close">Close</button></div>
      </div>
      <textarea class="nm-area" id="nm-area" placeholder="Write freely…">${esc(val||'')}</textarea>
    </div>`;
  document.body.appendChild(modal);
  const ta=modal.querySelector('#nm-area');
  ta.focus();
  const sync=()=>{
    if(isSeth)session.sethNotes=ta.value;else session.moNotes=ta.value;
    save();flash('nm-saved');
    // reflect back into the inline textarea if present
    const inline=document.getElementById(isSeth?'co-seth-notes':'co-mo-notes');if(inline)inline.value=ta.value;
  };
  ta.oninput=sync;
  const close=()=>{modal.remove();};
  modal.querySelector('.nm-close').onclick=close;
  modal.querySelector('.nm-backdrop').onclick=close;
  document.addEventListener('keydown',function esc(e){if(e.key==='Escape'){close();document.removeEventListener('keydown',esc);}});
}

/* MORNING FORMULA */
let moEdit=false;
function openHeadTrash(){
  const existing=document.getElementById('ht-modal');if(existing)existing.remove();
  const modal=document.createElement('div');
  modal.id='ht-modal';modal.className='note-modal';
  let invertingId=null; // id of item currently being inverted
  const render=()=>{
    const items=S.headTrash.slice().reverse();
    const list=items.length
      ? `<div class="ht-list">${items.map(h=>{
          if(h.id===invertingId){
            return `<div class="ht-item inverting" data-id="${h.id}">
              <div class="ht-invert">
                <div class="hti-original"><span class="hti-strike">${esc(h.text)}</span></div>
                <div class="hti-arrow">↓ flip it into who you're becoming</div>
                <textarea class="hti-input" id="hti-input" rows="2" placeholder="Write it in the present tense, framed around service or identity…">${esc(invertSuggest(h.text))}</textarea>
                <div class="hti-actions">
                  <button class="btn solid hti-save" data-id="${h.id}">Save to affirmations</button>
                  <button class="btn hti-cancel">Cancel</button>
                </div>
              </div>
            </div>`;
          }
          return `<div class="ht-item" data-id="${h.id}">
            <div class="ht-body"><div class="ht-text">${esc(h.text)}</div><div class="ht-time">${htTime(h.ts)}</div></div>
            <div class="ht-actions">
              <button class="ht-flip" data-id="${h.id}">Invert →</button>
              <button class="rm ht-del" data-id="${h.id}">×</button>
            </div>
          </div>`;
        }).join('')}</div>`
      : `<div class="empty" style="padding:30px 0;text-align:center">Nothing here yet.<br>When a limiting thought shows up, dump it — you can't change what you don't surface.</div>`;
    modal.innerHTML=`
      <div class="nm-backdrop"></div>
      <div class="nm-panel ht-panel">
        <div class="nm-head">
          <div class="nm-title">Head trash<span class="nm-sub">Dump it now. Invert it when you're ready.</span></div>
          <div class="nm-actions"><button class="btn nm-close">Close</button></div>
        </div>
        <div class="ht-add">
          <input id="ht-input" placeholder="What's the thought? Write it the moment it hits…" autocomplete="off">
          <button class="btn solid" id="ht-add-btn">Dump</button>
        </div>
        <div class="ht-scroll">${list}</div>
      </div>`;
    wire();
  };
  const wire=()=>{
    const htInput=modal.querySelector('#ht-input'),htBtn=modal.querySelector('#ht-add-btn');
    const add=()=>{const v=htInput.value.trim();if(!v)return;S.headTrash.push({id:'h'+Date.now(),text:v,ts:Date.now()});save();invertingId=null;render();const i=modal.querySelector('#ht-input');if(i)i.focus();};
    htBtn.onclick=add;htInput.onkeydown=e=>{if(e.key==='Enter')add();};
    modal.querySelectorAll('.ht-del').forEach(b=>b.onclick=()=>{S.headTrash=S.headTrash.filter(x=>x.id!==b.dataset.id);save();render();});
    modal.querySelectorAll('.ht-flip').forEach(b=>b.onclick=()=>{invertingId=b.dataset.id;render();const ta=modal.querySelector('#hti-input');if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);}});
    const cancel=modal.querySelector('.hti-cancel');if(cancel)cancel.onclick=()=>{invertingId=null;render();};
    const saveBtn=modal.querySelector('.hti-save');
    if(saveBtn)saveBtn.onclick=()=>{
      const ta=modal.querySelector('#hti-input');const v=(ta?ta.value:'').trim();if(!v)return;
      const m=moData();m.affirmations=m.affirmations||[];
      m.affirmations.push({id:'aff_'+Date.now(),text:v});
      S.headTrash=S.headTrash.filter(x=>x.id!==invertingId);
      invertingId=null;save();render();
    };
    const ta=modal.querySelector('#hti-input');if(ta)ta.onkeydown=e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)){e.preventDefault();if(saveBtn)saveBtn.click();}};
    const close=()=>{modal.remove();if(currentView==='morning')renderMorning();};
    modal.querySelector('.nm-close').onclick=close;
    modal.querySelector('.nm-backdrop').onclick=close;
  };
  document.body.appendChild(modal);
  render();
  const first=modal.querySelector('#ht-input');if(first)first.focus();
  document.addEventListener('keydown',function esc(e){if(e.key==='Escape'){const m=document.getElementById('ht-modal');if(m){m.remove();if(currentView==='morning')renderMorning();}document.removeEventListener('keydown',esc);}});
}
// Smart-ish starter for an inversion: strips common negative openers and gives a present-tense scaffold
function invertSuggest(text){
  let t=(text||'').trim().replace(/\.$/,'');
  const low=t.toLowerCase();
  const map=[
    [/^i (can'?t|cannot|could ?n'?t)\b/i,'I can'],
    [/^i'?m not\b/i,'I am'],
    [/^i am not\b/i,'I am'],
    [/^i don'?t\b/i,'I do'],
    [/^i'?m (afraid|scared|nervous|worried) (of|about|to)\b/i,'I am confident about'],
    [/^i (hate|dread)\b/i,'I love']
  ];
  for(const [re,rep] of map){ if(re.test(t)){ return t.replace(re,rep); } }
  // fallback: leave blank so he writes it fresh, but nudge with the frame
  return '';
}
function moData(){if(!S.morning)S.morning=structuredClone(DEFAULT.morning);const m=S.morning;
  m.vision=m.vision||[];
  ['affirmations','kickstarters','reminders'].forEach(key=>{
    m[key]=(m[key]||[]).map(item=>typeof item==='object'&&item?item:{id:key+'_'+Math.random().toString(36).slice(2,9),text:String(item)});
  });
  return m;}
function renderMorning(){
  const m=moData();
  const hour=new Date().getHours();
  const greetWord=hour<12?'Good morning':hour<18?'Good afternoon':'Good evening';
  const name=S.name?.trim()||'';
  main.innerHTML=`<div class="view">
    <div class="head">
      <div><h2 class="sec">Morning Formula</h2><p class="sec-sub">${greetWord}${name?', '+esc(name):''}.</p></div>
      <button class="btn ${moEdit?'solid':''}" id="mo-edit">${moEdit?'Done editing':'Edit'}</button>
    </div>

    <div class="card mo-vision" style="margin-bottom:16px">
      <h3>Vision board${moEdit?' <span class="h3sub">add image links or notes</span>':''}</h3>
      ${m.vision.length?`<div class="vboard">${m.vision.map(v=>moVisionCard(v)).join('')}</div>`:`<div class="empty">${moEdit?'Add your first vision tile below — paste an image URL, or just write the dream in words.':'Turn on Edit to build your vision board.'}</div>`}
      ${moEdit?`<div class="addrow" style="margin-top:16px"><input id="mo-vtext" placeholder="Caption / the dream in words"><input id="mo-vimg" placeholder="Image URL (optional)" style="flex:1.2"><button class="btn solid" id="mo-vadd">Add tile</button></div>`:''}
    </div>

    <div class="grid g2" style="margin-bottom:16px">
      ${moListCard('Affirmations','affirmations','','var(--accent)')}
      ${moListCard('Kickstarters','kickstarters','','var(--teal)')}
    </div>

    <div class="card">
      ${moListBody('Reminders for life','reminders','','var(--gold)')}
    </div>

    <div class="card headtrash-launch" id="ht-open">
      <div class="htl-left">
        <div class="htl-icon"><svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2M6 6l1 14a1 1 0 001 1h8a1 1 0 001-1l1-14"/></svg></div>
        <div>
          <div class="htl-title">Head trash</div>
          <div class="htl-sub">${(S.headTrash&&S.headTrash.length)?S.headTrash.length+' captured — tap to open':'Dump a negative thought, invert it later'}</div>
        </div>
      </div>
      <span class="htl-open">Open →</span>
    </div>
  </div>`;

  document.getElementById('ht-open').onclick=()=>openHeadTrash();
  document.getElementById('mo-edit').onclick=()=>{moEdit=!moEdit;renderMorning();};

  if(moEdit){
    const vadd=document.getElementById('mo-vadd');
    if(vadd)vadd.onclick=()=>{
      const t=document.getElementById('mo-vtext').value.trim();
      const img=document.getElementById('mo-vimg').value.trim();
      if(!t&&!img)return;
      m.vision.push({id:'v'+Date.now(),text:t,img});save();renderMorning();
    };
  }
  // wire each editable list
  ['affirmations','kickstarters','reminders'].forEach(key=>moWireList(key));
  // vision tile edits/deletes
  main.querySelectorAll('.vcard').forEach(card=>{
    const id=card.dataset.id;const item=m.vision.find(x=>x.id===id);if(!item)return;
    const del=card.querySelector('.vdel');if(del)del.onclick=()=>{m.vision=m.vision.filter(x=>x.id!==id);save();renderMorning();};
    const cap=card.querySelector('.vcap-edit');if(cap)cap.oninput=()=>{item.text=cap.value;save();};
  });
  const vb=main.querySelector('.vboard');
  if(vb)makeSortable(vb,'.vcard',ids=>{
    m.vision.sort((a,b)=>ids.indexOf(a.id)-ids.indexOf(b.id));save();
  });
}
function moVisionCard(v){
  const hasImg=!!v.img;
  return `<div class="vcard" data-id="${v.id}">
    ${hasImg?`<div class="vimg-wrap">
        <img src="${esc(v.img)}" alt="" loading="lazy" onerror="handleVisionImgError(this)">
        <div class="vscrim"></div>
        ${!moEdit&&v.text?`<div class="vcap-over">${esc(v.text)}</div>`:''}
      </div>`:`<div class="vimg noimg"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>${!moEdit&&v.text?`<div class="vcap">${esc(v.text)}</div>`:''}</div>`}
    ${moEdit?`<textarea class="vcap-edit" rows="2" placeholder="Caption">${esc(v.text||'')}</textarea><button class="rm vdel" title="Remove">×</button>`:''}
  </div>`;
}
function handleVisionImgError(img){
  const wrap=img.closest('.vimg-wrap');if(!wrap)return;
  wrap.innerHTML='<svg viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01"/><circle cx="12" cy="12" r="9"/></svg><span>Image link didn\'t load — check the URL</span>';
  wrap.classList.remove('vimg-wrap');wrap.classList.add('vimg','broken');
}
function moListCard(title,key,sub,accent){
  return `<div class="card">${moListBody(title,key,sub,accent)}</div>`;
}
function moListBody(title,key,sub,accent){
  const m=moData();const arr=m[key];
  return `<h3>${title}${sub?` <span class="h3sub">${sub}</span>`:''}</h3>
    <div class="mo-list" data-key="${key}">
      ${arr.length?arr.map(item=>{
        const id=typeof item==='object'?item.id:key+arr.indexOf(item);
        const text=typeof item==='object'?item.text:item;
        return `<div class="mo-line" data-id="${esc(String(id))}" style="--dot:${accent}">
          <span class="drag-grip">⠿</span>
          <span class="mo-dot"></span>
          ${moEdit?`<textarea class="mo-edit-line" rows="1">${esc(text)}</textarea><button class="rm mo-del">×</button>`:`<span class="mo-text">${esc(text)}</span>`}
        </div>`;
      }).join(''):`<div class="empty">${moEdit?'Add your first one below.':'Nothing here yet.'}</div>`}
    </div>
    ${moEdit?`<div class="addrow"><input class="mo-add-input" data-key="${key}" placeholder="Add to ${title.toLowerCase()}"><button class="btn mo-add-btn" data-key="${key}">Add</button></div>`:''}`;
}
function moWireList(key){
  const m=moData();
  const wrap=main.querySelector(`.mo-list[data-key="${key}"]`);
  if(wrap){
    wrap.querySelectorAll('.mo-line').forEach(line=>{
      const id=line.dataset.id;const item=m[key].find(x=>String(x.id)===id);
      const ta=line.querySelector('.mo-edit-line');
      if(ta){autosize(ta);ta.oninput=()=>{if(item){item.text=ta.value;save();}autosize(ta);};}
      const del=line.querySelector('.mo-del');
      if(del)del.onclick=()=>{m[key]=m[key].filter(x=>String(x.id)!==id);save();renderMorning();};
    });
  }
  if(wrap)makeSortable(wrap,'.mo-line',ids=>{
    m[key].sort((a,b)=>ids.indexOf(String(a.id))-ids.indexOf(String(b.id)));
    save();
  });
  const addInp=main.querySelector(`.mo-add-input[data-key="${key}"]`);
  const addBtn=main.querySelector(`.mo-add-btn[data-key="${key}"]`);
  if(addInp&&addBtn){
    const add=()=>{const v=addInp.value.trim();if(!v)return;m[key].push({id:key+'_'+Date.now(),text:v});save();renderMorning();};
    addBtn.onclick=add;addInp.onkeydown=e=>{if(e.key==='Enter')add();};
  }
}
function autosize(ta){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';}

/* helpers */
function bindText(id,apply,savedId){const el=document.getElementById(id);if(!el)return;el.oninput=()=>{apply(el.value);save();if(savedId)flash(savedId);};}
function flash(id){const s=document.getElementById(id);if(!s)return;s.classList.add('show');clearTimeout(window['__f'+id]);window['__f'+id]=setTimeout(()=>s.classList.remove('show'),900);}
function tick(){const d=new Date();document.getElementById('clock').textContent=pad(d.getHours())+':'+pad(d.getMinutes());document.getElementById('date').textContent=d.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'}).toUpperCase();}
function setActiveNav(v){document.querySelectorAll('.navbtn').forEach(x=>x.classList.toggle('active',x.dataset.view===v));}
document.querySelectorAll('.navbtn').forEach(b=>b.onclick=()=>{setActiveNav(b.dataset.view);currentView=b.dataset.view;render();});

// Open the native calendar picker when a date field is clicked anywhere (not just the tiny icon)
document.addEventListener('click',e=>{
  const el=e.target.closest('input[type=date]');

/* FIREBASE (Poppy sales) */
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=()=>rej(new Error('script load failed'));document.head.appendChild(s);});}
function setFBstatus(){
  const dot=document.getElementById('fb-dot'),lab=document.getElementById('fb-label');if(!dot)return;
  dot.className='dot'+(FB.status==='live'?' live':FB.status==='error'?' err':'');
  lab.textContent=FB.status==='live'?`Sales: live (${Object.keys(FB.days).length}d)`:FB.status==='error'?'Sales: offline':'Sales: connecting…';
}
async function connectFirebase(){
  FB.status='connecting';setFBstatus();
  try{
    const db=await fbInit();
    const doc=await db.collection(FIREBASE.collection).doc(FIREBASE.doc).get();
    if(!doc.exists)throw new Error('Doc not found');
    const raw=doc.data()[FIREBASE.field];
    const arr=typeof raw==='string'?JSON.parse(raw):(Array.isArray(raw)?raw:[]);
    const out={};arr.forEach(rec=>{if(rec&&rec.date)out[rec.date]=rec;});
    FB.days=out;FB.status='live';
  }catch(e){FB.status='error';FB.msg=(e&&e.message)||'Connection failed';}
  setFBstatus();
  if(currentView==='sales'||currentView==='home')render();
}

/* keyboard: habits 1-9 quick toggle */
document.addEventListener('keydown',e=>{
  if(currentView!=='habits'||habitDetail)return;
  if(document.getElementById('note-modal')||document.getElementById('ht-modal'))return;
  if(['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName))return;
  const n=parseInt(e.key,10);
  if(n>=1&&n<=9&&S.disciplines[n-1]){e.preventDefault();toggleHabit(today(),S.disciplines[n-1].id);save();renderHabits();}
});

/* boot */
(async function(){
  await load();
  const wn=document.getElementById('ws-name');wn.value=S.wsName||'OS';
  wn.oninput=()=>{S.wsName=wn.value;save();document.title=wn.value||'MO OS';document.getElementById('brandmark').textContent=(S.name||wn.value||'M').trim().charAt(0).toUpperCase()||'M';};
  document.title=S.wsName||'MO OS';
  document.getElementById('brandmark').textContent=(S.name||S.wsName||'M').trim().charAt(0).toUpperCase()||'M';
  tick();setInterval(tick,20000);
  render();
  connectFirebase();
})();
