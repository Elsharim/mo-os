<style>
  :root{
    --bg:#0a0b0f;
    --bg-2:#0e1016;
    --panel:#0f1218;
    --card:#14171f;
    --card-2:#1a1e28;
    --card-hi:#1f2531;
    --border:#242936;
    --border-2:#323a4b;
    --text:#eef1f6;
    --muted:#aab2c2;
    --faint:#7c8698;
    --accent:#5b8cff;
    --accent-2:#9d6bff;
    --accent-soft:rgba(91,140,255,.15);
    --teal:#2fd9c5;
    --good:#3ee099;
    --good-soft:rgba(62,224,153,.14);
    --warn:#f2b544;
    --warn-soft:rgba(242,181,68,.14);
    --bad:#f26a5e;
    --bad-soft:rgba(242,106,94,.14);
    --gold:#f5c76b;
    --r:14px;
    --r-sm:10px;
    --sans:'Inter',system-ui,-apple-system,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.25);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:
      radial-gradient(120% 90% at 100% -10%,rgba(91,140,255,.07),transparent 55%),
      radial-gradient(90% 70% at 0% 0%,rgba(157,107,255,.05),transparent 50%),
      var(--bg);
    color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}
  ::selection{background:rgba(91,140,255,.32)}
  button{font-family:inherit}
  input,textarea,select{font-family:inherit;color:inherit}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  a{color:var(--accent)}

  .shell{display:flex;min-height:100vh}
  .rail{width:216px;flex:0 0 216px;background:linear-gradient(180deg,var(--panel),var(--bg-2));border-right:1px solid var(--border);display:flex;flex-direction:column;gap:3px;padding:20px 13px;position:sticky;top:0;height:100vh}
  .brand{padding:6px 10px 20px;display:flex;flex-direction:column;gap:4px}
  .brand .logo{display:flex;align-items:center;gap:9px}
  .brand .mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;font-weight:800;font-size:15px;color:#fff;box-shadow:0 4px 12px rgba(91,140,255,.35);flex:0 0 32px}
  .brand input{background:none;border:none;font-size:17px;font-weight:700;color:var(--text);padding:0;width:100%;letter-spacing:-.01em}
  .brand input:focus{outline:none}
  .brand .sub{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);padding-left:1px}
  .navbtn{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:none;border:none;color:var(--muted);cursor:pointer;padding:11px 13px;border-radius:10px;font-size:13.5px;font-weight:500;transition:.15s;position:relative}
  .navbtn svg{width:18px;height:18px;flex:0 0 18px;stroke:currentColor;fill:none;stroke-width:1.7}
  .navbtn:hover{color:var(--text);background:rgba(255,255,255,.035)}
  .navbtn.active{color:var(--text);background:linear-gradient(90deg,var(--accent-soft),transparent 85%)}
  .navbtn.active::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;border-radius:0 3px 3px 0;background:linear-gradient(180deg,var(--accent),var(--accent-2))}
  .navbtn.active svg{stroke:var(--accent)}
  .rail-foot{margin-top:auto;padding:11px 13px;font-size:11px;color:var(--faint);display:flex;align-items:center;gap:8px}
  .rail-foot .dot{width:7px;height:7px;border-radius:99px;background:var(--faint)}
  .rail-foot .dot.live{background:var(--good);box-shadow:0 0 9px var(--good)}
  .rail-foot .dot.err{background:var(--bad)}

  .stage{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{border-bottom:1px solid var(--border);padding:18px 34px;display:flex;justify-content:space-between;align-items:center;gap:20px;background:linear-gradient(180deg,rgba(255,255,255,.015),transparent)}
  .topbar .hi{font-size:18px;font-weight:600;letter-spacing:-.01em;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .topbar .hi .greet-hey{font-size:19px;font-weight:700;letter-spacing:-.02em}
  .streak-badge{display:inline-flex;align-items:center;gap:7px;padding:6px 13px 6px 10px;border-radius:99px;
    background:linear-gradient(135deg,rgba(245,199,107,.16),rgba(245,199,107,.06));
    border:1px solid rgba(245,199,107,.35);box-shadow:0 2px 10px rgba(245,199,107,.12)}
  .streak-badge svg{width:16px;height:16px;fill:var(--gold);stroke:none;filter:drop-shadow(0 0 5px rgba(245,199,107,.5))}
  .streak-badge b{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--gold);line-height:1}
  .streak-badge span{font-size:11px;color:var(--gold);opacity:.85;letter-spacing:.02em}
  .topbar .clock{font-size:21px;font-weight:600;font-family:var(--mono);font-variant-numeric:tabular-nums;text-align:right}
  .topbar .date{font-size:11px;letter-spacing:.11em;text-transform:uppercase;color:var(--muted);margin-top:2px;text-align:right}

  main{padding:26px 34px 90px;max-width:1240px;width:100%}
  .view{animation:fade .3s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.view{animation:none}}

  .head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;gap:16px;flex-wrap:wrap}
  h2.sec{font-size:24px;font-weight:800;margin:0;letter-spacing:-.025em}
  .sec-sub{color:var(--muted);font-size:13px;margin:3px 0 0}

  .grid{display:grid;gap:16px}
  .g2{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g23{grid-template-columns:1.4fr 1fr}
  @media (max-width:960px){.g2,.g3,.g23{grid-template-columns:1fr}}

  .card{background:linear-gradient(180deg,var(--card),var(--bg-2));border:1px solid var(--border);border-radius:var(--r);padding:20px;transition:border-color .15s,transform .15s;box-shadow:var(--shadow)}
  .card.hover:hover{border-color:var(--border-2);transform:translateY(-2px)}
  .card h3{margin:0 0 16px;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .card h3 .h3sub{text-transform:none;letter-spacing:0;color:var(--faint);font-weight:500;font-size:11px}

  .hero{background:
      radial-gradient(120% 120% at 100% 0,rgba(157,107,255,.12),transparent 55%),
      linear-gradient(150deg,var(--card-hi),var(--card));
    border:1px solid var(--border-2);display:flex;gap:28px;align-items:center;flex-wrap:wrap}
  .ring-wrap{position:relative;width:140px;height:140px;flex:0 0 140px}
  .ring-wrap .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring-wrap .pct b{font-size:32px;font-weight:800;font-family:var(--mono);letter-spacing:-.02em}
  .ring-wrap .pct span{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:2px}
  .hero-info{flex:1;min-width:180px}
  .hero-info .big{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .hero-info .streak{font-size:46px;font-weight:800;line-height:1;letter-spacing:-.04em;margin:4px 0 2px;background:linear-gradient(90deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  .chip{font-size:11px;color:var(--muted);background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:99px;padding:5px 12px}
  .chip b{color:var(--text);font-family:var(--mono)}

  .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:13px}
  .tile{background:linear-gradient(180deg,var(--card),var(--bg-2));border:1px solid var(--border);border-radius:var(--r-sm);padding:16px 17px;transition:.15s;position:relative;overflow:hidden}
  .tile:hover{border-color:var(--border-2);transform:translateY(-2px)}
  .tile.big{grid-column:span 2}
  @media (max-width:600px){.tile.big{grid-column:span 1}}
  .tile .n{font-size:27px;font-weight:800;font-family:var(--mono);font-variant-numeric:tabular-nums;line-height:1;letter-spacing:-.02em}
  .tile .n.money{font-size:30px}
  .tile .n.accent{background:linear-gradient(90deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .tile .n.gold{color:var(--gold)}
  .tile .n.good{color:var(--good)}
  .tile .n.teal{color:var(--teal)}
  .tile .n.bad{color:var(--bad)}
  .tile .l{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:10px;font-weight:500}
  .tile .sub{font-size:10.5px;color:var(--faint);margin-top:3px}

  .meter{margin-bottom:16px}.meter:last-child{margin-bottom:0}
  .track{height:8px;background:var(--bg);border-radius:99px;overflow:hidden;border:1px solid var(--border)}
  .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:99px;transition:width .6s cubic-bezier(.2,.8,.2,1)}

  .funnel{display:flex;flex-direction:column;gap:9px}
  .fstep{display:grid;grid-template-columns:120px 1fr auto;align-items:center;gap:14px}
  .fstep .fl{font-size:12.5px;color:var(--muted)}
  .fbar-track{height:26px;background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden;position:relative}
  .fbar{height:100%;border-radius:7px;transition:width .6s cubic-bezier(.2,.8,.2,1);min-width:2px}
  .fstep .fv{font-family:var(--mono);font-size:13px;font-weight:600;min-width:78px;text-align:right}
  .fstep .fv small{color:var(--faint);font-weight:400;font-size:11px}

  .disc{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:2px}
  .disc li{display:flex;align-items:center;gap:12px;padding:10px 9px;border-radius:9px;cursor:pointer;transition:background .12s}
  .disc li:hover{background:rgba(255,255,255,.035)}
  .box{width:20px;height:20px;flex:0 0 20px;border:1.5px solid var(--border-2);border-radius:7px;display:grid;place-items:center;transition:.14s}
  .box svg{width:11px;height:11px;stroke:#04121a;stroke-width:3.2;opacity:0;fill:none}
  .disc li.done .box,.ai.done .box{background:linear-gradient(135deg,var(--good),#6ff0bd);border-color:var(--good)}
  .disc li.done .box svg{opacity:1}
  .disc li.done .lbl{color:var(--muted)}
  .disc .lbl{flex:1;font-size:13.5px}

  .addrow{display:flex;gap:9px;margin-top:14px}
  .hb-addrow{border:1px dashed var(--border-2);border-radius:11px;padding:8px 8px 8px 12px}
  .hb-addrow input{background:transparent}
  .addrow input,.inp{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:10px 13px;font-size:13px;color:var(--text)}
  .addrow input:focus,.inp:focus{outline:none;border-color:var(--accent)}
  .btn{background:var(--card-2);border:1px solid var(--border-2);color:var(--text);border-radius:9px;padding:10px 15px;font-size:12.5px;font-weight:500;cursor:pointer;transition:.13s;white-space:nowrap}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.solid{background:linear-gradient(135deg,var(--accent),var(--accent-2));border:none;color:#fff;box-shadow:0 4px 14px rgba(91,140,255,.3)}
  .btn.solid:hover{filter:brightness(1.1);color:#fff}
  a.track-btn{text-decoration:none;display:inline-flex;align-items:center;gap:7px}
  a.track-btn svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2}
  .rm{opacity:0;background:none;border:none;color:var(--faint);cursor:pointer;font-size:18px;line-height:1;padding:0 4px}
  li:hover .rm,.ai:hover .rm{opacity:.7}.rm:hover{color:var(--bad);opacity:1}
  .pill{font-size:11px;font-weight:500;padding:4px 11px;border-radius:99px;display:inline-flex;align-items:center;gap:6px}
  .pill .d{width:7px;height:7px;border-radius:99px;background:currentColor}
  .pill.live{color:var(--good);background:var(--good-soft)}
  .pill.off{color:var(--muted);background:rgba(255,255,255,.05)}
  .pill.err{color:var(--bad);background:var(--bad-soft)}
  .pill .d.live{animation:pulse 1.8s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  .seg{display:inline-flex;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:3px}
  .seg button{background:none;border:none;color:var(--muted);padding:6px 13px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:500;transition:.12s}
  .seg button.on{background:var(--card-2);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.3)}

  .bars{display:flex;align-items:stretch;gap:6px;height:150px;margin-top:8px}
  .bar-wrap{flex:1;height:100%;display:flex;flex-direction:column;align-items:center;min-width:0}
  .bar-col{flex:1;width:100%;display:flex;align-items:flex-end;justify-content:center}
  .bar{width:100%;max-width:30px;min-height:3px;background:var(--border-2);border-radius:5px 5px 0 0;transition:height .6s cubic-bezier(.2,.8,.2,1);position:relative}
  .bar.on{background:linear-gradient(180deg,var(--accent),var(--accent-2))}
  .bar.hit{background:linear-gradient(180deg,var(--good),#6ff0bd)}
  .bar-lbl{font-size:9.5px;color:var(--muted);margin-top:7px;white-space:nowrap}
  .bar-val{font-size:9px;color:var(--faint);margin-bottom:4px;white-space:nowrap}
  .seth-quote{margin:2px 0 20px;padding:11px 0 11px 16px;border-left:2px solid var(--border-2);color:var(--muted);font-size:13px;font-style:italic;line-height:1.5;max-width:640px}
  .seth-quote b{display:block;font-style:normal;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-top:6px;font-weight:600}

  .hb-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:18px}
  @media(max-width:600px){.hb-summary{grid-template-columns:1fr}}
  .hbcard{background:linear-gradient(180deg,var(--card),var(--bg-2));border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;display:flex;align-items:center;gap:15px;box-shadow:var(--shadow)}
  .hbcard .mini-ring{position:relative;width:56px;height:56px;flex:0 0 56px}
  .hbcard .mini-ring .mp{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text);z-index:1}
  .hbcard .hbc-info .hbc-n{font-size:22px;font-weight:800;letter-spacing:-.02em;font-family:var(--mono)}
  .hbcard .hbc-info .hbc-l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}

  .hboard{overflow-x:auto;margin:0 -4px;padding:0 4px}
  .hboard::-webkit-scrollbar{height:8px}.hboard::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:4px}
  .hgrid{border-collapse:separate;border-spacing:0;width:100%}
  .hgrid th{padding:0}
  .col-h{text-align:center;padding:0 0 10px;min-width:34px}
  .col-h .cd{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:.03em}
  .col-h .cn{font-size:12px;color:var(--muted);font-family:var(--mono);margin-top:2px}
  .col-h.istoday .cn{color:var(--accent);font-weight:700}
  .hname{padding:5px 12px 5px 2px;min-width:170px;position:sticky;left:0;background:var(--bg-2);z-index:2;display:flex;align-items:center;gap:9px}
  .hname input{background:none;border:1px solid transparent;border-radius:7px;color:var(--text);font-family:var(--sans);font-size:13.5px;padding:6px 8px;width:100%;transition:.12s}
  .hname input:hover{border-color:var(--border)}
  .hname input:focus{outline:none;border-color:var(--accent);background:var(--bg)}
  .hdot{width:8px;height:8px;border-radius:50%;flex:0 0 8px;box-shadow:0 0 8px currentColor}
  .hrow{transition:background .15s}
  .hrow:hover td{background:rgba(255,255,255,.025)}
  .hrow:hover .hname{background:rgba(255,255,255,.025)}
  .cell{width:28px;height:28px;margin:3px auto;border-radius:8px;background:var(--bg);border:1px solid var(--border);cursor:pointer;transition:.12s;display:grid;place-items:center}
  .cell:hover{border-color:var(--border-2);transform:scale(1.1)}
  .cell:hover{border-color:var(--accent);transform:scale(1.08)}

  input[type=date].datepick{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--text);font-family:var(--mono);font-size:12px;cursor:pointer}

  .list{list-style:none;margin:14px 0 0;padding:0;display:flex;flex-direction:column;gap:2px}

  .sess-body{flex:1;min-width:0}

  .sess-item .st span:first-child{overflow:hidden;text-overflow:ellipsis}
  .sess-item .sd{font-size:12px;letter-spacing:.02em;color:var(--muted);font-weight:500}
  .sbadge{font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:99px;background:var(--card-2);color:var(--muted);white-space:nowrap}

  .sbadge.over{color:var(--bad);background:var(--bad-soft)}
  .sbadge.clear{color:var(--good);background:var(--good-soft)}
  .co-empty{color:var(--faint);font-size:13px;padding:22px;text-align:center;border:1px dashed var(--border-2);border-radius:11px}
  .ai{display:flex;align-items:flex-start;gap:12px;padding:12px 11px;border-radius:10px;transition:background .12s;border:1px solid transparent}
  .ai:hover{background:rgba(255,255,255,.035)}
  .ai.overdue{border-color:rgba(242,106,94,.28)}

  .ai.done .box svg{opacity:1}
  .ai.done .ai-txt{color:var(--muted);text-decoration:line-through}
  .ai-main{flex:1;min-width:0}
  .ai-txt{font-size:13.5px;line-height:1.45}
  .ai-meta{display:flex;gap:10px;align-items:center;margin-top:6px;flex-wrap:wrap}

  .ai-due input:focus{outline:none}
  .ai-date{font-size:10px;font-family:var(--mono);color:var(--muted);display:inline-flex;align-items:center;gap:5px;background:var(--card-2);border:1px solid var(--border);border-radius:7px;padding:3px 8px}
  .ai-date.soon{color:var(--warn);border-color:rgba(242,181,68,.3)}.ai-date.past{color:var(--bad);border-color:rgba(242,106,94,.3)}
  .ai-date-lbl{text-transform:uppercase;letter-spacing:.05em;font-size:9px;color:var(--faint);font-family:var(--sans)}

  .ai-due-badge{font-size:10px;font-family:var(--mono);color:var(--faint);white-space:nowrap}

  .co-link{font-size:12px;color:var(--accent);text-decoration:none;display:inline-flex;align-items:center;gap:6px}

  .titlerow input.ttl:focus{outline:none;border-bottom-color:var(--accent)}
  .co-del{color:var(--muted);padding:8px 12px;font-size:12px}

  .due-list{display:flex;flex-direction:column;gap:3px}

  /* MORNING FORMULA */
  .mo-vision{background:
      radial-gradient(120% 120% at 0 0,rgba(245,199,107,.08),transparent 55%),
      linear-gradient(150deg,var(--card-hi),var(--card));border:1px solid var(--border-2)}
  .vboard{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
  .vcard{position:relative;background:var(--bg);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 6px 18px rgba(0,0,0,.18);transition:transform .18s,box-shadow .18s}
  .vcard:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(0,0,0,.28)}
  .vcard .vimg-wrap{position:relative;width:100%;aspect-ratio:4/5;background:var(--card-2);overflow:hidden}
  .vcard .vimg-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
  .vcard:hover .vimg-wrap img{transform:scale(1.04)}
  .vcard .vimg-wrap .vscrim{position:absolute;inset:0;background:linear-gradient(180deg,transparent 45%,rgba(0,0,0,.78) 100%);pointer-events:none}
  .vcard .vimg-wrap .vcap-over{position:absolute;left:0;right:0;bottom:0;padding:14px 14px 12px;font-size:13.5px;font-weight:600;line-height:1.4;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.5)}
  .vcard .vimg.noimg{aspect-ratio:4/5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:linear-gradient(160deg,var(--card),var(--card-2));padding:16px;text-align:center}
  .vcard .vimg.noimg svg{width:30px;height:30px;stroke:var(--faint);fill:none;stroke-width:1.5}
  .vcard .vimg.noimg .vcap{padding:0;color:var(--muted)}
  .vcard .vimg.broken{aspect-ratio:4/5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:var(--bad-soft);padding:16px;text-align:center}
  .vcard .vimg.broken svg{width:26px;height:26px;stroke:var(--bad);fill:none;stroke-width:1.6}
  .vcard .vimg.broken span{font-size:11.5px;color:var(--bad)}
  .vcard .vcap{padding:12px 14px;font-size:13.5px;line-height:1.45;color:var(--text)}
  .vcard textarea.vcap-edit{width:100%;border:none;border-top:1px solid var(--border);background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;padding:10px 12px;resize:none;line-height:1.4}
  .vcard textarea.vcap-edit:focus{outline:none;background:var(--card)}
  .vcard .vdel{position:absolute;top:9px;right:9px;z-index:2;opacity:1;background:rgba(10,11,15,.75);border-radius:7px;width:26px;height:26px;color:#fff;backdrop-filter:blur(4px)}
  .vcard .vdel:hover{color:var(--bad);background:rgba(10,11,15,.9)}
  .mo-list{display:flex;flex-direction:column;gap:4px}
  .mo-line{display:flex;align-items:flex-start;gap:12px;padding:11px 10px;border-radius:10px;transition:background .12s}

  /* DAILY SCORE */

<script>
/* ============================================================

   Sales = live from Poppy Firebase (poppy/log:Mo, field v = JSON string)
   Everything else = local via window.storage
   ============================================================ */
const FIREBASE = {
  config:{
    apiKey:"AIzaSyCYCt9-opphzCOSInAaPnrGIBN8M6kWW-Y",
    authDomain:"poppy-sales.firebaseapp.com",
    projectId:"poppy-sales",
    storageBucket:"poppy-sales.firebasestorage.app",
    messagingSenderId:"575070387533",

const STORE_KEY='os:v1';
const OS_DOC={collection:"poppy",doc:"os:Mo",field:"v"};
const _mem={};
let _fbDb=null;
async function fbInit(){
  if(_fbDb)return _fbDb;
  const base='https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/';
  if(!window.firebase){
    await loadScript(base+'firebase-app-compat.js');
    await loadScript(base+'firebase-firestore-compat.js');
  }
  if(!firebase.apps.length)firebase.initializeApp(FIREBASE.config);
  _fbDb=firebase.firestore();
  return _fbDb;
}
const store={
  async get(k){
    try{
      const db=await fbInit();
      const doc=await db.collection(OS_DOC.collection).doc(OS_DOC.doc).get();
      if(doc.exists){const v=doc.data()[OS_DOC.field];if(v!=null){_mem[k]=v;return v;}}
    }catch(e){console.warn('store.get failed',e);}
    return _mem[k]??null;
  },
  async set(k,v){
    _mem[k]=v;
    try{
      const db=await fbInit();
      await db.collection(OS_DOC.collection).doc(OS_DOC.doc).set({[OS_DOC.field]:v});
    }catch(e){console.warn('store.set failed',e);}
  }
};

const pad=n=>String(n).padStart(2,'0');
const keyOf=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
const today=()=>keyOf(new Date());
function addDays(k,n){const [y,m,d]=k.split('-').map(Number);const x=new Date(y,m-1,d);x.setDate(x.getDate()+n);return keyOf(x);}
const dow=k=>{const [y,m,d]=k.split('-').map(Number);return ['Su','Mo','Tu','We','Th','Fr','Sa'][new Date(y,m-1,d).getDay()];};
const shortDate=k=>{const p=k.split('-');return Number(p[1])+'/'+Number(p[2]);};
function longDate(k){const [y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d).toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});}
function daysUntil(s){const [y,m,d]=s.split('-').map(Number);const t=new Date(y,m-1,d),n=new Date();n.setHours(0,0,0,0);return Math.round((t-n)/864e5);}
function fmt(n){return Number(n||0).toLocaleString();}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function clip(s,n){s=(s||'').trim();return s.length>n?s.slice(0,n)+'…':s;}

const DEFAULT={

};

// One quiet line on the coaching page — no attribution
const SETH_QUOTES={
  coaching:"Your job isn't to sound perfect — it's to stay curious and let them convince themselves."
};

let S=null,currentView='home',saveTimer=null,habitRange=14;
const FB={status:'connecting',days:{},msg:''};

const HDOTS=['var(--accent)','var(--accent-2)','var(--teal)','var(--gold)','var(--good)'];
function dayRec(k){if(!S.days[k])S.days[k]={disc:{}};S.days[k].disc=S.days[k].disc||{};return S.days[k];}
function save(){clearTimeout(saveTimer);saveTimer=setTimeout(async()=>{await store.set(STORE_KEY,JSON.stringify(S));},250);}
async function load(){
  const raw=await store.get(STORE_KEY);
  if(raw){try{S=Object.assign(structuredClone(DEFAULT),JSON.parse(raw));}catch(e){S=structuredClone(DEFAULT);}}
  else S=structuredClone(DEFAULT);
  for(const k in DEFAULT)if(!(k in S))S[k]=structuredClone(DEFAULT[k]);
  // migrations
  if(!Array.isArray(S.tasks))S.tasks=[];
  if(!S.money||typeof S.money!=='object')S.money={cash:0,investments:0,crypto:0,taxReserve:0};
  ['cash','investments','crypto','taxReserve'].forEach(f=>{if(typeof S.money[f]!=='number')S.money[f]=Number(S.money[f])||0;});
  if(Array.isArray(S.disciplines))S.disciplines.forEach(d=>{if(typeof d.weight!=='number')d.weight=10;});
  if(!Array.isArray(S.headTrash))S.headTrash=[];
  if(!S.weeklyJournals||typeof S.weeklyJournals!=='object')S.weeklyJournals={};
}

function dayRatio(k){const r=S.days[k];if(!r||!r.disc||!S.disciplines.length)return 0;return S.disciplines.filter(d=>r.disc[d.id]).length/S.disciplines.length;}
function dayDone(k){const r=S.days[k];if(!r||!r.disc)return 0;return S.disciplines.filter(d=>r.disc[d.id]).length;}
function streak(){let n=0,k=today();if(dayScore(k)<60)k=addDays(k,-1);while(dayScore(k)>=60){n++;k=addDays(k,-1);}return n;}
function habitStreak(id){let n=0,k=today();const has=x=>S.days[x]&&S.days[x].disc&&S.days[x].disc[id];if(!has(k))k=addDays(k,-1);while(has(k)){n++;k=addDays(k,-1);}return n;}
function rangeDates(n){const a=[];for(let i=n-1;i>=0;i--)a.push(addDays(today(),-i));return a;}
function avgRatio(dates){if(!dates.length)return 0;let s=0;dates.forEach(k=>s+=dayRatio(k));return s/dates.length;}
function avgScore(dates){if(!dates.length)return 0;let s=0;dates.forEach(k=>s+=dayScore(k));return s/dates.length;}
function habitPct(id,dates){if(!dates.length)return 0;let c=0;dates.forEach(k=>{if(S.days[k]&&S.days[k].disc&&S.days[k].disc[id])c++;});return c/dates.length;}
function discWeight(d){return Number(d.weight)||0;}
function totalWeight(){return S.disciplines.reduce((s,d)=>s+discWeight(d),0);}
function dayScore(k){
  // weighted score 0-100 for a given day
  const tw=totalWeight();if(!tw)return 0;
  const r=S.days[k];const disc=(r&&r.disc)||{};
  const earned=S.disciplines.reduce((s,d)=>s+(disc[d.id]?discWeight(d):0),0);
  return Math.round(earned/tw*100);
}
function scoreBreakdown(k){
  const r=S.days[k];const disc=(r&&r.disc)||{};
  return S.disciplines.slice().sort((a,b)=>discWeight(b)-discWeight(a)).map(d=>({
    id:d.id,label:d.label,weight:discWeight(d),done:!!disc[d.id]
  }));
}

/* SALES */
function salesInRange(startK,endK){const out=[];Object.keys(FB.days).forEach(k=>{if(k>=startK&&k<=endK)out.push(FB.days[k]);});return out;}
function sumSales(rows){
  const g=k=>rows.reduce((s,d)=>s+(Number(d[k])||0),0);
  const sets=g('setsOB')+g('setsOther');
  const closes=g('consultCloses')+g('buys');
  const cc=g('consultCC')+g('buyCC');
  const rev=g('consultRev')+g('buyRev');
  return {obBooked:g('obBooked'),obShows:g('obShows'),sets,consultsCal:g('consultsCal'),consultShows:g('consultShows'),closes,cc,rev,buys:g('buys'),consultCloses:g('consultCloses')};
}
function weekBounds(){const t=today();const start=addDays(t,-((new Date().getDay()+6)%7));return {start,end:t,label:'this week'};}
function monthBounds(){const t=today();return {start:t.slice(0,8)+'01',end:t,label:'this month'};}
function allBounds(){const ks=Object.keys(FB.days).sort();return {start:ks[0]||today(),end:ks[ks.length-1]||today(),label:'all time'};}
// Monday-anchored week helpers
function weekStartOf(k){const [y,m,d]=k.split('-').map(Number);const dt=new Date(y,m-1,d);const off=(dt.getDay()+6)%7;return addDays(k,-off);}
function weekKey(k){return weekStartOf(k);} // key a week by its Monday
function weekDays(startK){const a=[];for(let i=0;i<7;i++)a.push(addDays(startK,i));return a;}
function weekLabel(startK){const end=addDays(startK,6);const s=startK.split('-'),e=end.split('-');return `${Number(s[1])}/${Number(s[2])} – ${Number(e[1])}/${Number(e[2])}`;}
function htTime(ts){const d=new Date(ts);const now=new Date();const sameDay=d.toDateString()===now.toDateString();const t=d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});return sameDay?('Today · '+t):d.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' · '+t;}

const main=document.getElementById('main');
function render(){({home:renderHome,sales:renderSales,habits:renderHabits,tasks:renderTasks,goals:renderGoals,coaching:renderCoaching,morning:renderMorning}[currentView])();topbar();}
function sethQuote(view){const q=SETH_QUOTES[view];return q?`<div class="seth-quote">“${q}”</div>`:'';}
function topbar(){

}

let _ringSeq=0;
function ring(pct,size,stroke,idSuffix){
  pct=Math.max(0,Math.min(1,Number(pct)||0));
  const r=(size/2)-stroke, C=2*Math.PI*r, off=C*(1-pct), c=size/2, gid='rg_'+(idSuffix||'x')+'_'+(++_ringSeq);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${c}" cy="${c}" r="${r}" stroke="var(--border)" stroke-width="${stroke}" fill="none"/>
    <circle cx="${c}" cy="${c}" r="${r}" stroke="url(#${gid})" stroke-width="${stroke}" fill="none" stroke-linecap="round" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 ${c} ${c})" style="transition:stroke-dashoffset .6s cubic-bezier(.2,.8,.2,1)"/>
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="var(--accent)"/><stop offset="1" stop-color="var(--accent-2)"/></linearGradient></defs>
  </svg>`;
}

function renderHome(){

  const nextSeth=allOpen.filter(a=>a.due).sort((a,b)=>a.due.localeCompare(b.due))[0];
  const overdue=allOpen.filter(a=>a.due&&a.due<t).length;

  const scoreColor=score>=80?'good':score>=50?'accent':'warn';

const TASK_BUCKETS=[
  {key:'must',label:'Must do',icon:'🔥',color:'var(--bad)'},
  {key:'important',label:'Important',icon:'⚡',color:'var(--warn)'},
  {key:'later',label:'Later',icon:'📌',color:'var(--muted)'}
];
function renderTasks(){
  S.tasks=S.tasks||[];
  const open=S.tasks.filter(x=>!x.done);
  const doneCount=S.tasks.filter(x=>x.done).length;
  main.innerHTML=`<div class="view">
    <div class="head"><div><h2 class="sec">Tasks</h2><p class="sec-sub">One-time to-dos. Recurring things live in Habits.</p></div>
      ${doneCount?`<button class="btn" id="clear-done">Clear ${doneCount} done</button>`:''}
    </div>
    ${TASK_BUCKETS.map(b=>{
      const items=S.tasks.filter(x=>x.bucket===b.key);
      return `<div class="card task-bucket" style="margin-bottom:16px">
        <div class="tb-head"><span class="tb-icon">${b.icon}</span><span class="tb-title">${b.label}</span>${items.filter(x=>!x.done).length?`<span class="tb-count">${items.filter(x=>!x.done).length}</span>`:''}</div>
        <ul class="disc task-list" data-bucket="${b.key}">
          ${items.length?items.map(x=>`<li class="${x.done?'done':''}" data-id="${x.id}"><span class="box"><svg viewBox="0 0 24 24"><path d="M4 12l6 6L20 6"/></svg></span><span class="lbl">${esc(x.text)}</span><button class="rm task-del">×</button></li>`).join(''):'<li class="empty">Nothing here.</li>'}
        </ul>
        <div class="addrow"><input class="task-add" data-bucket="${b.key}" placeholder="Add to ${b.label.toLowerCase()}"><button class="btn task-add-btn" data-bucket="${b.key}">Add</button></div>
      </div>`;
    }).join('')}
  </div>`;
  // toggle done
  main.querySelectorAll('.task-list').forEach(ul=>{
    ul.onclick=e=>{
      const li=e.target.closest('li');if(!li||!li.dataset.id)return;
      const x=S.tasks.find(z=>z.id===li.dataset.id);if(!x)return;
      if(e.target.closest('.task-del')){S.tasks=S.tasks.filter(z=>z.id!==li.dataset.id);}
      else{x.done=!x.done;}
      save();renderTasks();
    };
  });
  main.querySelectorAll('.task-add-btn').forEach(btn=>{
    const bucket=btn.dataset.bucket;
    const inp=main.querySelector(`.task-add[data-bucket="${bucket}"]`);
    const add=()=>{const v=inp.value.trim();if(!v)return;S.tasks.push({id:'t'+Date.now(),text:v,bucket,done:false});save();renderTasks();};
    btn.onclick=add;inp.onkeydown=e=>{if(e.key==='Enter')add();};
  });
  const cd=document.getElementById('clear-done');if(cd)cd.onclick=()=>{S.tasks=S.tasks.filter(x=>!x.done);save();renderTasks();};
}

        <table class="hgrid">
          <thead><tr>
            <th class="hname"></th>
            ${dates.map(k=>{const t=k===today();return `<th class="col-h ${t?'istoday':''}"><div class="cd">${dow(k)}</div><div class="cn">${Number(k.split('-')[2])}</div></th>`;}).join('')}
            <th class="hstats"></th><th></th>
          </tr></thead>
          <tbody>
            ${S.disciplines.map((d,i)=>{
              const stk=habitStreak(d.id),pct=Math.round(habitPct(d.id,dates)*100);
              return `<tr class="hrow">
                <td class="hname"><span class="hdot" style="background:${HDOTS[i%HDOTS.length]};color:${HDOTS[i%HDOTS.length]}"></span><input value="${esc(d.label)}" data-id="${d.id}" class="hlabel" spellcheck="false"><span class="hwt" title="Daily-score weight"><input class="hweight" data-id="${d.id}" inputmode="numeric" value="${discWeight(d)}"><span class="hwt-lbl">pts</span></span></td>
                ${dates.map(k=>{const on=S.days[k]&&S.days[k].disc&&S.days[k].disc[d.id];const t=k===today();return `<td><div class="cell ${on?'on':''} ${t?'istoday':''}" data-id="${d.id}" data-day="${k}">${on?'<svg viewBox="0 0 24 24"><path d="M4 12l6 6L20 6"/></svg>':''}</div></td>`;}).join('')}
                <td class="hstats"><div class="hp">${pct}%</div><div class="hs">${stk>0?`<b>${stk}🔥</b> streak`:'no streak'}</div></td>

              </tr>`;
            }).join('')}
            <tr class="totalrow">
              <td class="tl">Day score</td>
              ${dates.map(k=>{const r=dayScore(k);const bg=r>=80?'var(--good-soft)':r>=50?'var(--accent-soft)':r>0?'rgba(255,255,255,.05)':'transparent';const col=r>=80?'var(--good)':r>=50?'var(--accent)':'var(--faint)';return `<td><div class="daytot" style="background:${bg};color:${col}" title="${k}: ${r}/100">${r}</div></td>`;}).join('')}
              <td></td><td></td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="addrow hb-addrow"><input id="hadd" placeholder="+ Add a discipline"><button class="btn solid" id="hadd-btn">Add</button></div>
    </div>`;
}
function wireBoard(){
  main.querySelectorAll('.cell').forEach(c=>c.onclick=()=>{const r=dayRec(c.dataset.day);r.disc[c.dataset.id]=!r.disc[c.dataset.id];save();renderHabits();});
  main.querySelectorAll('.hlabel').forEach(inp=>inp.onchange=()=>{const d=S.disciplines.find(x=>x.id===inp.dataset.id);if(d){d.label=inp.value.trim()||d.label;save();}});
  main.querySelectorAll('.hweight').forEach(inp=>inp.onchange=()=>{const d=S.disciplines.find(x=>x.id===inp.dataset.id);if(d){const v=parseInt(inp.value.replace(/[^0-9]/g,''),10);d.weight=isNaN(v)?0:v;save();renderHabits();}});
  main.querySelectorAll('.rowdel').forEach(b=>b.onclick=()=>{S.disciplines=S.disciplines.filter(d=>d.id!==b.dataset.id);save();renderHabits();});
  main.querySelectorAll('[data-range]').forEach(b=>b.onclick=()=>{habitRange=Number(b.dataset.range);renderHabits();});
  const inp=document.getElementById('hadd'),btn=document.getElementById('hadd-btn');
  const add=()=>{const v=inp.value.trim();if(!v)return;S.disciplines.push({id:'d'+Date.now(),label:v,weight:10});save();renderHabits();};
  btn.onclick=add;inp.onkeydown=e=>{if(e.key==='Enter')add();};
}
/* WEEKLY REVIEW */
let weeklyOffset=0; // 0 = this week, 1 = last week...
function weeklyHTML(){
  const thisWeekStart=weekStartOf(today());
  const startK=addDays(thisWeekStart,-7*weeklyOffset);
  const wk=weekDays(startK);
  const jr=S.weeklyJournals[startK]||{win:'',drop:'',change:''};
  // discipline stats for the week
  const scores=wk.filter(k=>k<=today()).map(k=>dayScore(k));
  const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):0;
  const bestDay=wk.filter(k=>k<=today()).reduce((best,k)=>dayScore(k)>dayScore(best)?k:best,wk[0]);
  // per-discipline hit count this week
  const perDisc=S.disciplines.map(d=>{
    let hit=0,total=0;wk.forEach(k=>{if(k<=today()){total++;if(S.days[k]&&S.days[k].disc&&S.days[k].disc[d.id])hit++;}});
    return {label:d.label,hit,total,weight:discWeight(d)};
  });
  // sales for the week
  const sales=sumSales(salesInRange(startK,addDays(startK,6)));
  const isCurrent=weeklyOffset===0;

  return `
    <div class="wk-nav">
      <button class="btn" id="wk-prev">← Previous</button>
      <div class="wk-title">${isCurrent?'This week':(weeklyOffset===1?'Last week':weeklyOffset+' weeks ago')}<span>${weekLabel(startK)}</span></div>
      <button class="btn" id="wk-next" ${isCurrent?'disabled':''}>Next →</button>
    </div>
    <div class="tiles" style="margin-bottom:16px">
      <div class="tile"><div class="n accent">${avg}</div><div class="l">Avg score</div><div class="sub">/ 100</div></div>
      <div class="tile"><div class="n money good">$${fmt(sales.cc)}</div><div class="l">Cash collected</div></div>
      <div class="tile"><div class="n good">${sales.closes}</div><div class="l">Closes</div></div>
      <div class="tile"><div class="n teal">${sales.sets}</div><div class="l">Sets</div></div>
    </div>
    <div class="grid g2" style="margin-bottom:16px">
      <div class="card">

function coSorted(){return coData().sessions.slice().sort((a,b)=>b.date.localeCompare(a.date));}
function coCounts(s){let open=0,over=0;const t=today();(s.actions||[]).forEach(a=>{if(!a.done){open++;if(a.due&&a.due<t)over++;}});return {open,over,total:(s.actions||[]).length};}
function coAllActions(){const out=[];coData().sessions.forEach(s=>(s.actions||[]).forEach(a=>{if(!a.done)out.push({...a,sess:s});}));return out;}
function newSession(){const s={id:'s'+Date.now(),date:today(),title:'',link:'',sethNotes:'',moNotes:'',actions:[]};coData().sessions.push(s);coSel=s.id;save();renderCoaching();}
function migrateSession(s){
  if(s.sethNotes===undefined)s.sethNotes=s.notes||'';
  if(s.moNotes===undefined)s.moNotes='';
  (s.actions||[]).forEach(a=>{if(a.set===undefined)a.set=s.date||today();});

}
function dueLabel(k){if(!k)return '';const d=daysUntil(k);if(d===0)return 'today';if(d===1)return 'tomorrow';if(d===-1)return 'yesterday';if(d<0)return `${-d}d overdue`;if(d<=7)return `in ${d}d`;return shortDate(k);}

/* Paste your Zapier "Catch Hook" webhook URL here */
const ZAP_WEBHOOK_URL='https://hooks.zapier.com/hooks/catch/27212587/443o22l/';

async function pullFromFathom(s){
  if(!s.link){alert('Add the Fathom link first.');return;}
  if(ZAP_WEBHOOK_URL.includes('PASTE_YOUR')){alert('Set ZAP_WEBHOOK_URL in the code first.');return;}
  const btn=document.getElementById('co-pull-btn'),status=document.getElementById('co-pull-status');
  btn.disabled=true;status.textContent='Sending to Zapier…';
  try{
    await fetch(ZAP_WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({sessionId:s.id,url:s.link})});
  }catch(e){status.textContent='Could not reach Zapier — check the webhook URL.';btn.disabled=false;return;}
  status.textContent='Processing transcript… usually 20–40s';
  const db=await fbInit();
  const start=Date.now();
  const poll=setInterval(async()=>{
    if(Date.now()-start>90000){clearInterval(poll);status.textContent='Timed out — check the Zap history for errors.';btn.disabled=false;return;}
    try{
      const doc=await db.collection('coaching_results').doc(s.id).get();
      if(doc.exists&&doc.data().status==='ready'){
        clearInterval(poll);
        const d=doc.data();
        s.moNotes=s.moNotes?s.moNotes+'\n\n'+d.notes:d.notes;
        (d.actions||[]).forEach(t=>{s.actions=s.actions||[];s.actions.push({id:'a'+Date.now()+Math.random().toString(36).slice(2,6),text:t,set:today(),due:'',done:false});});
        save();renderCoaching();
        status.textContent='Done — notes added.';btn.disabled=false;
        db.collection('coaching_results').doc(s.id).delete().catch(()=>{});
      }
    }catch(e){/* keep polling */}
  },4000);
}

      const ta=modal.querySelector('#hti-input');const v=(ta?ta.value:'').trim();if(!v)return;
      const m=moData();m.affirmations=m.affirmations||[];
      m.affirmations.push({id:'aff_'+Date.now(),text:v});
      S.headTrash=S.headTrash.filter(x=>x.id!==invertingId);
      invertingId=null;save();render();
    };
    const ta=modal.querySelector('#hti-input');if(ta)ta.onkeydown=e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)){e.preventDefault();if(saveBtn)saveBtn.click();}};
    const close=()=>{modal.remove();if(currentView==='morning')renderMorning();};
    modal.querySelector('.nm-close').onclick=close;
    modal.querySelector('.nm-backdrop').onclick=close;
  };
  document.body.appendChild(modal);
  render();
  const first=modal.querySelector('#ht-input');if(first)first.focus();
  document.addEventListener('keydown',function esc(e){if(e.key==='Escape'){const m=document.getElementById('ht-modal');if(m){m.remove();if(currentView==='morning')renderMorning();}document.removeEventListener('keydown',esc);}});
}
// Smart-ish starter for an inversion: strips common negative openers and gives a present-tense scaffold
function invertSuggest(text){
  let t=(text||'').trim().replace(/\.$/,'');
  const low=t.toLowerCase();
  const map=[
    [/^i (can'?t|cannot|could ?n'?t)\b/i,'I can'],
    [/^i'?m not\b/i,'I am'],
    [/^i am not\b/i,'I am'],
    [/^i don'?t\b/i,'I do'],
    [/^i'?m (afraid|scared|nervous|worried) (of|about|to)\b/i,'I am confident about'],
    [/^i (hate|dread)\b/i,'I love']
  ];
  for(const [re,rep] of map){ if(re.test(t)){ return t.replace(re,rep); } }
  // fallback: leave blank so he writes it fresh, but nudge with the frame
  return '';
}
function moData(){if(!S.morning)S.morning=structuredClone(DEFAULT.morning);const m=S.morning;
  m.vision=m.vision||[];
  ['affirmations','kickstarters','reminders'].forEach(key=>{
    m[key]=(m[key]||[]).map(item=>typeof item==='object'&&item?item:{id:key+'_'+Math.random().toString(36).slice(2,9),text:String(item)});
  });
  return m;}
function renderMorning(){
  const m=moData();
  const hour=new Date().getHours();
  const greetWord=hour<12?'Good morning':hour<18?'Good afternoon':'Good evening';
  const name=S.name?.trim()||'';
  main.innerHTML=`<div class="view">
    <div class="head">
      <div><h2 class="sec">Morning Formula</h2><p class="sec-sub">${greetWord}${name?', '+esc(name):''}.</p></div>
      <button class="btn ${moEdit?'solid':''}" id="mo-edit">${moEdit?'Done editing':'Edit'}</button>
    </div>

    <div class="card mo-vision" style="margin-bottom:16px">
      <h3>Vision board${moEdit?' <span class="h3sub">add image links or notes</span>':''}</h3>
      ${m.vision.length?`<div class="vboard">${m.vision.map(v=>moVisionCard(v)).join('')}</div>`:`<div class="empty">${moEdit?'Add your first vision tile below — paste an image URL, or just write the dream in words.':'Turn on Edit to build your vision board.'}</div>`}
      ${moEdit?`<div class="addrow" style="margin-top:16px"><input id="mo-vtext" placeholder="Caption / the dream in words"><input id="mo-vimg" placeholder="Image URL (optional)" style="flex:1.2"><button class="btn solid" id="mo-vadd">Add tile</button></div>`:''}
    </div>

    <div class="grid g2" style="margin-bottom:16px">
      ${moListCard('Affirmations','affirmations','','var(--accent)')}
      ${moListCard('Kickstarters','kickstarters','','var(--teal)')}
    </div>

    <div class="card">
      ${moListBody('Reminders for life','reminders','','var(--gold)')}
    </div>

    <div class="card headtrash-launch" id="ht-open">
      <div class="htl-left">
        <div class="htl-icon"><svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2M6 6l1 14a1 1 0 001 1h8a1 1 0 001-1l1-14"/></svg></div>
        <div>
          <div class="htl-title">Head trash</div>
          <div class="htl-sub">${(S.headTrash&&S.headTrash.length)?S.headTrash.length+' captured — tap to open':'Dump a negative thought, invert it later'}</div>
        </div>
      </div>
      <span class="htl-open">Open →</span>
    </div>
  </div>`;

  document.getElementById('ht-open').onclick=()=>openHeadTrash();
  document.getElementById('mo-edit').onclick=()=>{moEdit=!moEdit;renderMorning();};

  if(moEdit){
    const vadd=document.getElementById('mo-vadd');
    if(vadd)vadd.onclick=()=>{
      const t=document.getElementById('mo-vtext').value.trim();
      const img=document.getElementById('mo-vimg').value.trim();
      if(!t&&!img)return;
      m.vision.push({id:'v'+Date.now(),text:t,img});save();renderMorning();
    };
  }
  // wire each editable list
  ['affirmations','kickstarters','reminders'].forEach(key=>moWireList(key));
  // vision tile edits/deletes
  main.querySelectorAll('.vcard').forEach(card=>{
    const id=card.dataset.id;const item=m.vision.find(x=>x.id===id);if(!item)return;
    const del=card.querySelector('.vdel');if(del)del.onclick=()=>{m.vision=m.vision.filter(x=>x.id!==id);save();renderMorning();};
    const cap=card.querySelector('.vcap-edit');if(cap)cap.oninput=()=>{item.text=cap.value;save();};
  });
}
function moVisionCard(v){
  const hasImg=!!v.img;
  return `<div class="vcard" data-id="${v.id}">
    ${hasImg?`<div class="vimg-wrap">
        <img src="${esc(v.img)}" alt="" loading="lazy" onerror="handleVisionImgError(this)">
        <div class="vscrim"></div>
        ${!moEdit&&v.text?`<div class="vcap-over">${esc(v.text)}</div>`:''}
      </div>`:`<div class="vimg noimg"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>${!moEdit&&v.text?`<div class="vcap">${esc(v.text)}</div>`:''}</div>`}
    ${moEdit?`<textarea class="vcap-edit" rows="2" placeholder="Caption">${esc(v.text||'')}</textarea><button class="rm vdel" title="Remove">×</button>`:''}
  </div>`;
}
function handleVisionImgError(img){
  const wrap=img.closest('.vimg-wrap');if(!wrap)return;
  wrap.innerHTML='<svg viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01"/><circle cx="12" cy="12" r="9"/></svg><span>Image link didn\'t load — check the URL</span>';
  wrap.classList.remove('vimg-wrap');wrap.classList.add('vimg','broken');
}
function moListCard(title,key,sub,accent){
  return `<div class="card">${moListBody(title,key,sub,accent)}</div>`;
}
function moListBody(title,key,sub,accent){
  const m=moData();const arr=m[key];
  return `<h3>${title}${sub?` <span class="h3sub">${sub}</span>`:''}</h3>
    <div class="mo-list" data-key="${key}">
      ${arr.length?arr.map(item=>{
        const id=typeof item==='object'?item.id:key+arr.indexOf(item);
        const text=typeof item==='object'?item.text:item;
        return `<div class="mo-line" data-id="${esc(String(id))}" style="--dot:${accent}">
          <span class="mo-dot"></span>
          ${moEdit?`<textarea class="mo-edit-line" rows="1">${esc(text)}</textarea><button class="rm mo-del">×</button>`:`<span class="mo-text">${esc(text)}</span>`}
        </div>`;
      }).join(''):`<div class="empty">${moEdit?'Add your first one below.':'Nothing here yet.'}</div>`}
    </div>
    ${moEdit?`<div class="addrow"><input class="mo-add-input" data-key="${key}" placeholder="Add to ${title.toLowerCase()}"><button class="btn mo-add-btn" data-key="${key}">Add</button></div>`:''}`;
}
function moWireList(key){
  const m=moData();
  const wrap=main.querySelector(`.mo-list[data-key="${key}"]`);
  if(wrap){
    wrap.querySelectorAll('.mo-line').forEach(line=>{
      const id=line.dataset.id;const item=m[key].find(x=>String(x.id)===id);
      const ta=line.querySelector('.mo-edit-line');
      if(ta){autosize(ta);ta.oninput=()=>{if(item){item.text=ta.value;save();}autosize(ta);};}
      const del=line.querySelector('.mo-del');
      if(del)del.onclick=()=>{m[key]=m[key].filter(x=>String(x.id)!==id);save();renderMorning();};
    });
  }
  const addInp=main.querySelector(`.mo-add-input[data-key="${key}"]`);
  const addBtn=main.querySelector(`.mo-add-btn[data-key="${key}"]`);
  if(addInp&&addBtn){
    const add=()=>{const v=addInp.value.trim();if(!v)return;m[key].push({id:key+'_'+Date.now(),text:v});save();renderMorning();};
    addBtn.onclick=add;addInp.onkeydown=e=>{if(e.key==='Enter')add();};
  }
}
function autosize(ta){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';}

/* helpers */
function bindText(id,apply,savedId){const el=document.getElementById(id);if(!el)return;el.oninput=()=>{apply(el.value);save();if(savedId)flash(savedId);};}
function flash(id){const s=document.getElementById(id);if(!s)return;s.classList.add('show');clearTimeout(window['__f'+id]);window['__f'+id]=setTimeout(()=>s.classList.remove('show'),900);}
function tick(){const d=new Date();document.getElementById('clock').textContent=pad(d.getHours())+':'+pad(d.getMinutes());document.getElementById('date').textContent=d.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'}).toUpperCase();}
function setActiveNav(v){document.querySelectorAll('.navbtn').forEach(x=>x.classList.toggle('active',x.dataset.view===v));}
document.querySelectorAll('.navbtn').forEach(b=>b.onclick=()=>{setActiveNav(b.dataset.view);currentView=b.dataset.view;render();});

// Open the native calendar picker when a date field is clicked anywhere (not just the tiny icon)
document.addEventListener('click',e=>{
  const el=e.target.closest('input[type=date]');
  if(el&&typeof el.showPicker==='function'){try{el.showPicker();}catch(_){}}
});

/* FIREBASE (Poppy sales) */
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=()=>rej(new Error('script load failed'));document.head.appendChild(s);});}
function setFBstatus(){
  const dot=document.getElementById('fb-dot'),lab=document.getElementById('fb-label');if(!dot)return;
  dot.className='dot'+(FB.status==='live'?' live':FB.status==='error'?' err':'');
  lab.textContent=FB.status==='live'?`Sales: live (${Object.keys(FB.days).length}d)`:FB.status==='error'?'Sales: offline':'Sales: connecting…';
}
async function connectFirebase(){
  FB.status='connecting';setFBstatus();
  try{
    const db=await fbInit();
    const doc=await db.collection(FIREBASE.collection).doc(FIREBASE.doc).get();
    if(!doc.exists)throw new Error('Doc not found');
    const raw=doc.data()[FIREBASE.field];
    const arr=typeof raw==='string'?JSON.parse(raw):(Array.isArray(raw)?raw:[]);
    const out={};arr.forEach(rec=>{if(rec&&rec.date)out[rec.date]=rec;});
    FB.days=out;FB.status='live';
  }catch(e){FB.status='error';FB.msg=(e&&e.message)||'Connection failed';}
  setFBstatus();
  if(currentView==='sales'||currentView==='home')render();
}

/* boot */
(async function(){
  await load();
  const wn=document.getElementById('ws-name');wn.value=S.wsName||'OS';
  wn.oninput=()=>{S.wsName=wn.value;save();document.title=wn.value||'MO OS';document.getElementById('brandmark').textContent=(S.name||wn.value||'M').trim().charAt(0).toUpperCase()||'M';};
  document.title=S.wsName||'MO OS';
  document.getElementById('brandmark').textContent=(S.name||S.wsName||'M').trim().charAt(0).toUpperCase()||'M';
  tick();setInterval(tick,20000);
  render();
  connectFirebase();
})();
